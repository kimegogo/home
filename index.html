<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邱宅燈光配置互動設計系統 (1212d 版)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons for UI -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      user-select: none;
    }
    /* 自訂捲軸 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }
    .canvas-container {
      cursor: default;
    }
    .canvas-container.draw-mode {
      cursor: crosshair;
    }
    .canvas-container.pan-mode {
      cursor: grab;
    }
    .canvas-container.pan-mode:active {
      cursor: grabbing;
    }
  </style>
</head>
<body class="bg-slate-100 text-gray-800 min-h-screen flex flex-col overflow-hidden">

  <!-- 頂部導覽列 -->
  <header class="bg-slate-900 text-white px-6 py-3 flex items-center justify-between shadow-md z-10 flex-shrink-0">
    <div class="flex items-center space-x-3">
      <div class="bg-amber-500 text-slate-950 p-2 rounded-lg font-bold">
        <i class="fa-solid fa-lightbulb text-xl animate-pulse"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-wider">邱宅燈光配置互動設計系統</h1>
        <p class="text-xs text-slate-400">專業配電、開關、燈具排版與線路繪製工具 (1212d 直式格局)</p>
      </div>
    </div>
    
    <div class="flex items-center space-x-3">
      <!-- 上傳底圖 -->
      <label class="flex items-center space-x-1 bg-slate-800 hover:bg-slate-700 text-slate-200 px-3 py-2 rounded-lg cursor-pointer text-sm font-medium transition shadow-sm border border-slate-700">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        <span>上傳戶型底圖</span>
        <input type="file" id="bg-upload" accept="image/*" class="hidden">
      </label>
      
      <!-- 重新設定 -->
      <button id="btn-reset" class="flex items-center space-x-1 bg-red-950/40 hover:bg-red-900/60 text-red-300 border border-red-900/50 px-3 py-2 rounded-lg text-sm font-medium transition shadow-sm">
        <i class="fa-solid fa-arrow-rotate-left"></i>
        <span>重置配置</span>
      </button>

      <!-- 儲存為 JPG -->
      <button id="btn-export" class="flex items-center space-x-1 bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm font-semibold transition shadow-sm shadow-emerald-900/20">
        <i class="fa-solid fa-file-image"></i>
        <span>儲存為 JPG 檔案</span>
      </button>
    </div>
  </header>

  <!-- 主要工作區 -->
  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- 左側工具欄 (元件庫 & 控制) -->
    <aside class="w-80 bg-white border-r border-gray-200 flex flex-col flex-shrink-0 z-10">
      <!-- 工具切換標籤 -->
      <div class="border-b border-gray-100 p-4">
        <h2 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">滑鼠操作模式</h2>
        <div class="grid grid-cols-2 gap-2">
          <button id="tool-select" class="flex items-center justify-center space-x-2 py-2 px-3 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-medium text-sm transition">
            <i class="fa-solid fa-arrow-pointer"></i>
            <span>選擇與拖曳</span>
          </button>
          <button id="tool-pan" class="flex items-center justify-center space-x-2 py-2 px-3 rounded-lg border-2 border-transparent bg-gray-50 text-gray-600 hover:bg-gray-100 font-medium text-sm transition">
            <i class="fa-solid fa-hand"></i>
            <span>平移底圖</span>
          </button>
        </div>
      </div>

      <!-- 元件庫分組 -->
      <div class="flex-1 overflow-y-auto p-4 space-y-6">
        <!-- 元件編輯輔助區 -->
        <div id="element-actions-box" class="hidden p-3 bg-indigo-50/80 rounded-xl border border-indigo-100 space-y-2">
          <h4 class="text-xs font-bold text-indigo-800">已選取元件操作</h4>
          <div class="grid grid-cols-2 gap-2">
            <button id="btn-clone-el" class="flex items-center justify-center space-x-1 py-1.5 bg-white border border-indigo-200 hover:bg-indigo-100 text-indigo-700 text-xs font-medium rounded-lg transition">
              <i class="fa-solid fa-copy"></i>
              <span>複製元件</span>
            </button>
            <button id="btn-delete-el" class="flex items-center justify-center space-x-1 py-1.5 bg-red-50 border border-red-200 hover:bg-red-100 text-red-600 text-xs font-medium rounded-lg transition">
              <i class="fa-solid fa-trash-can"></i>
              <span>刪除元件</span>
            </button>
          </div>
        </div>

        <!-- 1. 燈具光源 -->
        <div>
          <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
            <span class="w-1.5 h-4 bg-amber-500 rounded-full mr-2"></span>
            1. 燈具與光源 (點擊加入)
          </h3>
          <div class="grid grid-cols-2 gap-2">
            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-amber-400 hover:bg-amber-50/30 transition text-center group" data-type="light-7.5">
              <svg width="28" height="28" viewBox="0 0 32 32" class="mb-1.5">
                <circle cx="16" cy="16" r="10" fill="none" stroke="#22c55e" stroke-width="2"/>
                <line x1="16" y1="6" x2="16" y2="26" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="2,2"/>
                <line x1="6" y1="16" x2="26" y2="16" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="2,2"/>
              </svg>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-amber-700">7.5CM 嵌燈</span>
              <span class="text-[9px] text-gray-400 mt-0.5">綠色十字圓</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-amber-400 hover:bg-amber-50/30 transition text-center group" data-type="light-9">
              <svg width="28" height="28" viewBox="0 0 32 32" class="mb-1.5">
                <circle cx="16" cy="16" r="12" fill="none" stroke="#22c55e" stroke-width="2"/>
                <circle cx="16" cy="16" r="4" fill="#22c55e"/>
              </svg>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-amber-700">9CM 嵌燈</span>
              <span class="text-[9px] text-gray-400 mt-0.5">綠心圓燈</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-amber-400 hover:bg-amber-50/30 transition text-center group" data-type="light-12">
              <svg width="28" height="28" viewBox="0 0 32 32" class="mb-1.5">
                <circle cx="16" cy="16" r="13" fill="none" stroke="#4b5563" stroke-width="2.5"/>
                <circle cx="16" cy="16" r="7" fill="none" stroke="#4b5563" stroke-width="1.5"/>
              </svg>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-amber-700">12CM 嵌燈</span>
              <span class="text-[9px] text-gray-400 mt-0.5">雙心圓燈</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-amber-400 hover:bg-amber-50/30 transition text-center group" data-type="light-pendant">
              <svg width="28" height="28" viewBox="0 0 32 32" class="mb-1.5">
                <circle cx="16" cy="16" r="10" fill="none" stroke="#4b5563" stroke-width="2"/>
                <line x1="16" y1="6" x2="16" y2="26" stroke="#4b5563" stroke-width="2"/>
                <line x1="6" y1="16" x2="26" y2="16" stroke="#4b5563" stroke-width="2"/>
              </svg>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-amber-700">吊燈</span>
              <span class="text-[9px] text-gray-400 mt-0.5">放射圓</span>
            </button>
          </div>
        </div>

        <!-- 2. 開關控制 -->
        <div>
          <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
            <span class="w-1.5 h-4 bg-blue-500 rounded-full mr-2"></span>
            2. 開關面板 (點擊加入)
          </h3>
          <div class="grid grid-cols-2 gap-2">
            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-blue-400 hover:bg-blue-50/30 transition text-center group" data-type="switch-s">
              <div class="w-9 h-9 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 font-semibold text-sm mb-1 bg-white">S</div>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-blue-700">原有單切</span>
              <span class="text-[9px] text-gray-400">灰色單切 S</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-blue-400 hover:bg-blue-50/30 transition text-center group" data-type="switch-s3">
              <div class="w-9 h-9 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 font-semibold text-sm mb-1 bg-white relative">
                S<span class="text-[8px] absolute top-1 right-2 font-bold">3</span>
              </div>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-blue-700">原有雙切</span>
              <span class="text-[9px] text-gray-400">灰色雙切 S3</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-red-400 hover:bg-red-50/30 transition text-center group" data-type="switch-new-s">
              <div class="w-9 h-9 rounded-full border border-red-200 flex items-center justify-center text-red-500 font-bold text-sm mb-1 bg-red-50/50">S</div>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-red-700">新增單切</span>
              <span class="text-[9px] text-red-400">紅色單切 S</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2.5 border border-gray-200 rounded-xl hover:border-red-400 hover:bg-red-50/30 transition text-center group" data-type="switch-new-s3">
              <div class="w-9 h-9 rounded-full border border-red-200 flex items-center justify-center text-red-500 font-bold text-sm mb-1 bg-red-50/50 relative">
                S<span class="text-[8px] absolute top-1 right-2 font-bold">3</span>
              </div>
              <span class="text-xs font-semibold text-gray-700 group-hover:text-red-700">新增雙切</span>
              <span class="text-[9px] text-red-400">紅色雙切 S3</span>
            </button>
          </div>
        </div>

        <!-- 3. 配線與條燈 -->
        <div>
          <h3 class="text-sm font-bold text-gray-700 mb-3 flex items-center">
            <span class="w-1.5 h-4 bg-orange-500 rounded-full mr-2"></span>
            3. 配電線路與燈條
          </h3>
          <div class="space-y-2">
            <!-- 單切線路 -->
            <button id="btn-draw-single" class="draw-tool-btn w-full flex items-center justify-between p-2.5 border border-gray-200 rounded-xl hover:border-gray-400 hover:bg-gray-50 transition text-left">
              <div class="flex items-center space-x-2">
                <svg width="30" height="20" class="flex-shrink-0">
                  <path d="M 0,10 Q 7,2 15,10 T 30,10" fill="none" stroke="#1f2937" stroke-width="2"/>
                </svg>
                <div>
                  <div class="text-xs font-semibold text-gray-700">單切線路 (黑色正弦波)</div>
                  <div class="text-[9px] text-gray-400">點擊開關與燈具依序連線</div>
                </div>
              </div>
            </button>

            <!-- 雙切線路 -->
            <button id="btn-draw-double" class="draw-tool-btn w-full flex items-center justify-between p-2.5 border border-gray-200 rounded-xl hover:border-red-400 hover:bg-red-50/30 transition text-left">
              <div class="flex items-center space-x-2">
                <svg width="30" height="20" class="flex-shrink-0">
                  <path d="M 0,10 Q 7,2 15,10 T 30,10" fill="none" stroke="#ef4444" stroke-width="2"/>
                </svg>
                <div>
                  <div class="text-xs font-semibold text-gray-700">雙切線路 (紅色正弦波)</div>
                  <div class="text-[9px] text-gray-400">雙控開關迴路連線</div>
                </div>
              </div>
            </button>

            <!-- 鋁條燈 -->
            <button id="btn-draw-strip-orange" class="draw-tool-btn w-full flex items-center justify-between p-2.5 border border-gray-200 rounded-xl hover:border-orange-400 hover:bg-orange-50/30 transition text-left">
              <div class="flex items-center space-x-2">
                <div class="w-8 h-2.5 bg-orange-500 rounded border border-orange-600 flex-shrink-0"></div>
                <div>
                  <div class="text-xs font-semibold text-gray-700">鋁條燈 (橘色粗線)</div>
                  <div class="text-[9px] text-gray-400">點選兩點繪製嵌入條燈</div>
                </div>
              </div>
            </button>

            <!-- 罩板燈 -->
            <button id="btn-draw-strip-yellow" class="draw-tool-btn w-full flex items-center justify-between p-2.5 border border-gray-200 rounded-xl hover:border-amber-400 hover:bg-amber-50/30 transition text-left">
              <div class="flex items-center space-x-2">
                <div class="w-8 h-2.5 bg-amber-300 rounded border border-amber-400 flex-shrink-0"></div>
                <div>
                  <div class="text-xs font-semibold text-gray-700">罩板燈 (黃色粗線)</div>
                  <div class="text-[9px] text-gray-400">間接照明反射燈槽</div>
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- 底圖控制調整 -->
      <div class="border-t border-gray-200 p-4 bg-gray-50 space-y-3">
        <h4 class="text-xs font-bold text-gray-500 uppercase tracking-wider">背景底圖顯示調整</h4>
        <div>
          <div class="flex justify-between text-xs text-gray-500 mb-1">
            <span>底圖透明度</span>
            <span id="val-opacity">90%</span>
          </div>
          <input type="range" id="bg-opacity" min="0" max="100" value="90" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
        </div>
        <div class="flex justify-between text-xs">
          <button id="btn-fit-screen" class="text-indigo-600 hover:text-indigo-800 font-medium">
            <i class="fa-solid fa-expand mr-1"></i>滿版顯示
          </button>
          <button id="btn-toggle-grid" class="text-gray-600 hover:text-gray-800 font-medium">
            <i class="fa-solid fa-border-all mr-1"></i>網格吸附 (開啟)
          </button>
        </div>
      </div>
    </aside>

    <!-- 中央主要畫布區 -->
    <main class="flex-1 bg-white flex items-center justify-center overflow-hidden relative">
      <!-- 快捷操作提示框 -->
      <div class="absolute top-4 left-4 bg-slate-900/95 text-white text-xs px-4 py-2.5 rounded-xl shadow-lg z-20 flex items-center space-x-3 border border-slate-700 backdrop-blur-sm pointer-events-none transition-all duration-300" id="tip-bar">
        <span class="inline-block w-2.5 h-2.5 rounded-full bg-amber-500 animate-ping"></span>
        <span id="tip-text">提示：點擊元件可拖曳；點選任何元件按 Delete 即可刪除。</span>
      </div>

      <!-- 線路控制浮動選單 (僅在繪圖模式中顯示) -->
      <div id="draw-actions" class="absolute top-4 right-4 bg-white px-4 py-2.5 rounded-xl shadow-lg z-20 hidden items-center space-x-2 border border-gray-200">
        <span class="text-xs font-semibold text-gray-600 mr-2" id="draw-mode-label">正在繪製：單切線路</span>
        <button id="btn-draw-cancel" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-lg text-xs font-medium transition">
          取消
        </button>
        <button id="btn-draw-done" class="bg-indigo-600 hover:bg-indigo-500 text-white px-3 py-1 rounded-lg text-xs font-medium transition">
          結束此線
        </button>
      </div>

      <!-- 快捷鍵說明 -->
      <div class="absolute bottom-4 left-4 text-[10px] text-gray-400 bg-white/80 backdrop-blur-sm px-3 py-2 rounded-lg border border-gray-200/50 pointer-events-none space-y-0.5">
        <div>💡 操作提醒：</div>
        <div>• 雙擊畫布空白處可取消選取。</div>
        <div>• 按住滑鼠中鍵、空白鍵，或使用「平移底圖」工具可拖曳移動整張平面圖。</div>
      </div>

      <!-- 視窗容器 -->
      <div class="w-full h-full overflow-hidden flex items-center justify-center" id="viewport">
        <!-- 畫布核心容器 (直式比例符合 1212d.jpg) -->
        <div id="canvas-container" class="canvas-container relative bg-white shadow-2xl origin-center select-none" style="width: 800px; height: 960px;">
          <!-- 1. 背景底圖層 (直接使用 1212d.jpg) -->
          <img id="layout-bg-img" src="1212d.jpg" class="absolute inset-0 w-full h-full object-contain pointer-events-none transition-opacity" style="opacity: 0.9;" onerror="this.src='https://placehold.co/800x960/ffffff/94a3b8?text=1212d.jpg+Load+Error'; showToast('未偵測到 1212d.jpg 實體檔案，請點擊上傳底圖進行載入。', 'warning')">
          
          <!-- 2. 向量線路圖層 -->
          <canvas id="wiring-canvas" class="absolute inset-0 pointer-events-none" width="800" height="960"></canvas>

          <!-- 3. HTML 元件互動控制層 -->
          <div id="elements-layer" class="absolute inset-0"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- 彈出式訊息提示 -->
  <div id="toast" class="fixed bottom-6 right-6 transform translate-y-10 opacity-0 bg-slate-900 text-white px-5 py-3 rounded-xl shadow-2xl z-50 flex items-center space-x-3 transition-all duration-300 border border-slate-800">
    <i class="fa-solid fa-circle-check text-emerald-400 text-lg"></i>
    <span class="text-sm font-medium" id="toast-text">儲存成功</span>
  </div>

  <!-- ==================== 核心 JavaScript ==================== -->
  <script>
    // 配合 1212d.jpg 設計圖位置做高精度預配置
    let state = {
      appId: 'chiu-lighting-designer-1212d',
      zoom: 0.85, // 初始縮放，讓直式大圖更完美呈現
      panX: 0,
      panY: -40,
      isPanning: false,
      startPanX: 0,
      startPanY: 0,
      activeTool: 'select', 
      activeDrawTool: null, 
      snapToGrid: true,
      gridSize: 10,
      bgImageSrc: '1212d.jpg',
      bgOpacity: 0.9,
      
      // 設計元件數據 (完美切合 1212d.jpg 格局位置)
      elements: [], 
      connections: [], 
      
      selectedElementId: null,
      tempWiringPoints: [], 
      hoveredSnapPoint: null, 
    };

    // DOM 節點
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('canvas-container');
    const elementsLayer = document.getElementById('elements-layer');
    const wiringCanvas = document.getElementById('wiring-canvas');
    const wiringCtx = wiringCanvas.getContext('2d');
    const layoutBgImg = document.getElementById('layout-bg-img');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toast-text');
    const tipText = document.getElementById('tip-text');
    const tipBar = document.getElementById('tip-bar');
    const elementActionsBox = document.getElementById('element-actions-box');
    
    // UI 控制按鈕
    const toolSelect = document.getElementById('tool-select');
    const toolPan = document.getElementById('tool-pan');
    const bgOpacitySlider = document.getElementById('bg-opacity');
    const valOpacity = document.getElementById('val-opacity');
    const btnToggleGrid = document.getElementById('btn-toggle-grid');
    const btnFitScreen = document.getElementById('btn-fit-screen');
    const btnReset = document.getElementById('btn-reset');
    const btnExport = document.getElementById('btn-export');
    const bgUpload = document.getElementById('bg-upload');
    const btnCloneEl = document.getElementById('btn-clone-el');
    const btnDeleteEl = document.getElementById('btn-delete-el');
    
    // 繪製工具按鈕
    const btnDrawSingle = document.getElementById('btn-draw-single');
    const btnDrawDouble = document.getElementById('btn-draw-double');
    const btnDrawStripOrange = document.getElementById('btn-draw-strip-orange');
    const btnDrawStripYellow = document.getElementById('btn-draw-strip-yellow');
    const drawActions = document.getElementById('draw-actions');
    const drawModeLabel = document.getElementById('draw-mode-label');
    const btnDrawCancel = document.getElementById('btn-draw-cancel');
    const btnDrawDone = document.getElementById('btn-draw-done');

    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
      loadInitial1212dElements();
      renderAll();
      setupEventListeners();
      showToast('1212d 設計底圖已載入！', 'info');
    });

    function loadInitial1212dElements() {
      // 根據 1212d.jpg 格局繪製燈具與開關位置
      state.elements = [
        // === 頂部區域房間 (原客廳/陽台配置在 rotated 後的位置) ===
        { id: 'el-l1', type: 'light-9', x: 254, y: 310 },
        { id: 'el-l2', type: 'light-9', x: 310, y: 310 },
        { id: 'el-l3', type: 'light-9', x: 366, y: 310 },
        { id: 'el-l4', type: 'light-9', x: 508, y: 310 },
        { id: 'el-l5', type: 'light-9', x: 564, y: 310 },

    // 渲染配線與燈條的 Canvas
    function renderWiring() {
      wiringCtx.clearRect(0, 0, wiringCanvas.width, wiringCanvas.height);
      
      state.connections.forEach(conn => {
        let pts = [];
        if (conn.fromElementId && conn.toElementId) {
          const fromEl = state.elements.find(e => e.id === conn.fromElementId);
          const toEl = state.elements.find(e => e.id === conn.toElementId);
          if (fromEl && toEl) {
            pts = [{ x: fromEl.x, y: fromEl.y }];
            if (conn.points && conn.points.length > 2) {
              pts = pts.concat(conn.points.slice(1, -1));
            }
            pts.push({ x: toEl.x, y: toEl.y });
          } else {
            pts = conn.points;
          }
        } else {
          pts = conn.points;
        }

        if (!pts || pts.length < 2) return;

        if (conn.type === 'single-wiring' || conn.type === 'double-wiring') {
          const isDouble = conn.type === 'double-wiring';
          wiringCtx.strokeStyle = isDouble ? '#ef4444' : '#1f2937';
          wiringCtx.lineWidth = 2.5;
          wiringCtx.lineCap = 'round';
          wiringCtx.lineJoin = 'round';
          drawWavyPath(wiringCtx, pts);
        } else if (conn.type === 'strip-orange') {
          wiringCtx.strokeStyle = '#f97316';
          wiringCtx.lineWidth = 6;
          wiringCtx.lineCap = 'square';
          wiringCtx.beginPath();
          wiringCtx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) wiringCtx.lineTo(pts[i].x, pts[i].y);
          wiringCtx.stroke();
        } else if (conn.type === 'strip-yellow') {
          wiringCtx.strokeStyle = '#facc15';
          wiringCtx.lineWidth = 6;
          wiringCtx.lineCap = 'square';
          wiringCtx.beginPath();
          wiringCtx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) wiringCtx.lineTo(pts[i].x, pts[i].y);
          wiringCtx.stroke();
        }
      });

      // 繪製拉線中的動態預覽
      if (state.activeDrawTool && state.tempWiringPoints.length > 0) {
        const isDouble = state.activeDrawTool === 'double-wiring';
        const isOrange = state.activeDrawTool === 'strip-orange';
        const isYellow = state.activeDrawTool === 'strip-yellow';

        wiringCtx.lineWidth = (isOrange || isYellow) ? 6 : 2.5;
        wiringCtx.strokeStyle = isOrange ? '#f97316' : (isYellow ? '#facc15' : (isDouble ? '#ef4444' : '#1f2937'));
        wiringCtx.lineCap = 'round';

        if (isOrange || isYellow) {
          wiringCtx.beginPath();
          wiringCtx.moveTo(state.tempWiringPoints[0].x, state.tempWiringPoints[0].y);
          for (let i = 1; i < state.tempWiringPoints.length; i++) {
            wiringCtx.lineTo(state.tempWiringPoints[i].x, state.tempWiringPoints[i].y);
          }
          wiringCtx.stroke();
        } else {
          drawWavyPath(wiringCtx, state.tempWiringPoints);
        }
      }

      // 繪製吸附綠點
      if (state.hoveredSnapPoint) {
        wiringCtx.fillStyle = '#22c55e';
        wiringCtx.beginPath();
        wiringCtx.arc(state.hoveredSnapPoint.x, state.hoveredSnapPoint.y, 6, 0, Math.PI * 2);
        wiringCtx.fill();
        wiringCtx.strokeStyle = 'white';
        wiringCtx.lineWidth = 1.5;
        wiringCtx.stroke();
      }
    }

    // 正弦波算法
    function drawWavyPath(ctx, points) {
      if (points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);

      for (let i = 0; i < points.length - 1; i++) {
        let p1 = points[i];
        let p2 = points[i+1];
        let dx = p2.x - p1.x;
        let dy = p2.y - p1.y;
        let dist = Math.hypot(dx, dy);
        
        if (dist === 0) continue;
        const wavelength = 15; 
        const amplitude = 4.5;   
        let angle = Math.atan2(dy, dx);
        
        for (let t = 0; t <= dist; t += 2) {
          let ratio = t / dist;
          let bx = p1.x + dx * ratio;
          let by = p1.y + dy * ratio;
          let wave = Math.sin((t / wavelength) * Math.PI * 2) * amplitude;
          let x = bx - Math.sin(angle) * wave;
          let y = by + Math.cos(angle) * wave;
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
    }

    // 縮放平移
    function updateViewport() {
      container.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;
    }

    function setupEventListeners() {
      // 點擊新增元件
      document.querySelectorAll('.add-item-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const type = btn.getAttribute('data-type');
          addNewElement(type);
          setMouseMode('select');
        });
      });

      toolSelect.addEventListener('click', () => setMouseMode('select'));
      toolPan.addEventListener('click', () => setMouseMode('pan'));

      // 雙擊空白取消選擇
      container.addEventListener('dblclick', () => {
        state.selectedElementId = null;
        renderElements();
      });

      // 滾輪縮放
      viewport.addEventListener('wheel', (e) => {
        e.preventDefault();
        const zoomIntensity = 0.08;
        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left - rect.width / 2;
        const mouseY = e.clientY - rect.top - rect.height / 2;
        
        const oldZoom = state.zoom;
        if (e.deltaY < 0) {
          state.zoom = Math.min(state.zoom + zoomIntensity, 3.0);
        } else {
          state.zoom = Math.max(state.zoom - zoomIntensity, 0.4);
        }
        
        state.panX -= mouseX * (state.zoom / oldZoom - 1);
        state.panY -= mouseY * (state.zoom / oldZoom - 1);
        updateViewport();
      }, { passive: false });

      // 平移底圖
      viewport.addEventListener('mousedown', (e) => {
        if (e.button === 1 || state.activeTool === 'pan') {
          state.isPanning = true;
          state.startPanX = e.clientX - state.panX;
          state.startPanY = e.clientY - state.startPanY;
          viewport.style.cursor = 'grabbing';
          e.preventDefault();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (state.isPanning) {
          state.panX = e.clientX - state.startPanX;
          state.panY = e.clientY - state.startPanY;
          updateViewport();
        }
      });

      window.addEventListener('mouseup', () => {
        if (state.isPanning) {
          state.isPanning = false;
          viewport.style.cursor = state.activeTool === 'pan' ? 'grab' : 'default';
        }
      });

      // 線路繪製 click
      container.addEventListener('click', (e) => {
        if (!state.activeDrawTool) return;
        
        const rect = container.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) / state.zoom;
        const clickY = (e.clientY - rect.top) / state.zoom;
        
        let targetX = clickX;
        let targetY = clickY;

        const snap = getSnapPoint(clickX, clickY);
        if (snap) {
          targetX = snap.x;
          targetY = snap.y;
        } else if (state.snapToGrid) {
          targetX = Math.round(clickX / state.gridSize) * state.gridSize;
          targetY = Math.round(clickY / state.gridSize) * state.gridSize;
        }

        if (state.activeDrawTool === 'single-wiring' || state.activeDrawTool === 'double-wiring') {
          if (state.tempWiringPoints.length === 0) {
            if (snap && snap.elementId) {
              state.tempWiringPoints.push({ x: targetX, y: targetY, elementId: snap.elementId });
              updateTipText("已選定起點，請點擊轉折點，最後點選終點燈具或開關完成線路。");
            } else {
              showToast("請點選一個開關或燈具作為配線起點", "warning");
              return;
            }
          } else {
            if (snap && snap.elementId) {
              state.tempWiringPoints.push({ x: targetX, y: targetY, elementId: snap.elementId });
              saveWiringConnection();
            } else {
              state.tempWiringPoints.push({ x: targetX, y: targetY });
            }
          }
        } else if (state.activeDrawTool === 'strip-orange' || state.activeDrawTool === 'strip-yellow') {
          if (state.tempWiringPoints.length === 0) {
            state.tempWiringPoints.push({ x: targetX, y: targetY });
            updateTipText("已設定起點，請在畫布上點選終點。");
          } else {
            state.tempWiringPoints.push({ x: targetX, y: targetY });
            saveStripConnection();
          }
        }
        renderWiring();
      });

      container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) / state.zoom;
        const clickY = (e.clientY - rect.top) / state.zoom;

        const snap = getSnapPoint(clickX, clickY);
        state.hoveredSnapPoint = snap ? snap : null;

        if (state.activeDrawTool && state.tempWiringPoints.length > 0) {
          let currentTargetX = clickX;
          let currentTargetY = clickY;

          if (snap) {
            currentTargetX = snap.x;
            currentTargetY = snap.y;
          } else if (state.snapToGrid) {
            currentTargetX = Math.round(clickX / state.gridSize) * state.gridSize;
            currentTargetY = Math.round(clickY / state.gridSize) * state.gridSize;
          }

          if (state.tempWiringPoints.length > 1 && !state.tempWiringPoints[state.tempWiringPoints.length - 1].elementId) {
            state.tempWiringPoints[state.tempWiringPoints.length - 1] = { x: currentTargetX, y: currentTargetY };
          } else {
            state.tempWiringPoints.push({ x: currentTargetX, y: currentTargetY });
          }
        }
        renderWiring();
      });

      // 配電按鈕綁定
      btnDrawSingle.addEventListener('click', () => startDrawMode('single-wiring'));
      btnDrawDouble.addEventListener('click', () => startDrawMode('double-wiring'));
      btnDrawStripOrange.addEventListener('click', () => startDrawMode('strip-orange'));

      // 透明度 slider
      bgOpacitySlider.addEventListener('input', (e) => {

      btnToggleGrid.addEventListener('click', () => {
        state.snapToGrid = !state.snapToGrid;
        btnToggleGrid.innerHTML = state.snapToGrid ? '<i class="fa-solid fa-border-all mr-1"></i>網格吸附 (開啟)' : '<i class="fa-solid fa-border-all mr-1"></i>網格吸附 (關閉)';

        showToast(state.snapToGrid ? "已啟用網格吸附" : "已停用網格吸附", "info");
      });

      btnFitScreen.addEventListener('click', resetView);

      // 複製與刪除元件按鈕事件 (適合行動裝置)
      btnCloneEl.addEventListener('click', cloneSelectedElement);
      btnDeleteEl.addEventListener('click', deleteSelectedElement);

      btnReset.addEventListener('click', () => {

          loadInitial1212dElements();
          renderAll();
          showToast("配置已回復預設 1212d 佈局", "info");
        }
      });

      bgUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(evt) {
            state.bgImageSrc = evt.target.result;
            layoutBgImg.src = state.bgImageSrc;
            layoutBgImg.style.display = 'block';
            showToast("新底圖上傳成功！", "success");
            resetView();
          };
          reader.readAsDataURL(file);
        }
      });

      // 鍵盤刪除功能
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
          deleteSelectedElement();
        }
      });

      btnExport.addEventListener('click', exportLayoutAsJPG);
    }

    // 新增元件
    function addNewElement(type) {
      const x = 400;
      const y = 480;
      const id = `el-${Date.now()}`;
      state.elements.push({ id, type, x, y });
      state.selectedElementId = id;
      renderAll();
      showToast("已成功加入元件！您可以任意拖曳它。", "success");
    }

    // 複製元件
    function cloneSelectedElement() {
      if (!state.selectedElementId) return;
      const origin = state.elements.find(el => el.id === state.selectedElementId);
      if (origin) {
        const id = `el-${Date.now()}`;
        state.elements.push({
          id,
          type: origin.type,
          x: origin.x + 20, // 稍微偏移，避免完全重疊
          y: origin.y + 20
        });
        state.selectedElementId = id;
        renderAll();
        showToast("元件已複製成功", "success");
      }
    }

    // 刪除元件
    function deleteSelectedElement() {
      if (state.selectedElementId) {
        state.elements = state.elements.filter(el => el.id !== state.selectedElementId);
        state.connections = state.connections.filter(c => c.fromElementId !== state.selectedElementId && c.toElementId !== state.selectedElementId);
        state.selectedElementId = null;
        renderAll();
        showToast("元件與相關線路已刪除", "info");
      }
    }

    // 元件拖曳 handle
    function handleElementMouseDown(e, element) {
      if (state.activeTool === 'pan' || state.activeDrawTool) return;
      e.stopPropagation();

      state.selectedElementId = element.id;
      renderElements();

      const startX = e.clientX;
      const startY = e.clientY;
      const origX = element.x;
      const origY = element.y;

      function onMouseMove(moveEvt) {
        const dx = (moveEvt.clientX - startX) / state.zoom;
        const dy = (moveEvt.clientY - startY) / state.zoom;
        let newX = origX + dx;
        let newY = origY + dy;

        newX = Math.max(15, Math.min(800 - 15, newX));
        newY = Math.max(15, Math.min(960 - 15, newY));

        if (state.snapToGrid) {
          newX = Math.round(newX / state.gridSize) * state.gridSize;
          newY = Math.round(newY / state.gridSize) * state.gridSize;
        }

        element.x = newX;
        element.y = newY;

        const dom = document.getElementById(element.id);
        if (dom) {
          dom.style.left = `${newX}px`;
          dom.style.top = `${newY}px`;
        }
        renderWiring();
      }

      function onMouseUp() {
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      }

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
    }

    function getSnapPoint(x, y) {
      const snapRadius = 20; 
      for (let i = 0; i < state.elements.length; i++) {
        const el = state.elements[i];
        const dist = Math.hypot(el.x - x, el.y - y);
        if (dist < snapRadius) {
          return { x: el.x, y: el.y, elementId: el.id };
        }
      }
      return null;
    }

    function setMouseMode(mode) {
      state.activeTool = mode;
      toolSelect.className = mode === 'select' 
        ? "flex items-center justify-center space-x-2 py-2 px-3 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-medium text-sm transition"
        : "flex items-center justify-center space-x-2 py-2 px-3 rounded-lg border-2 border-transparent bg-gray-50 text-gray-600 hover:bg-gray-100 font-medium text-sm transition";

      toolPan.className = mode === 'pan'
        ? "flex items-center justify-center space-x-2 py-2 px-3 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-medium text-sm transition"
        : "flex items-center justify-center space-x-2 py-2 px-3 rounded-lg border-2 border-transparent bg-gray-50 text-gray-600 hover:bg-gray-100 font-medium text-sm transition";

      if (mode === 'pan') {
        container.className = "canvas-container pan-mode relative bg-white shadow-2xl origin-center select-none";
        cancelDrawMode();
      } else {
        container.className = "canvas-container relative bg-white shadow-2xl origin-center select-none";
      }
    }

    function startDrawMode(tool) {
      setMouseMode('select');
      state.activeDrawTool = tool;
      state.tempWiringPoints = [];
      container.classList.add('draw-mode');
      drawActions.style.display = 'flex';
      
      let title = "";
      if (tool === 'single-wiring') {
        title = "正在繪製：單切線路 (黑色波浪)";
        updateTipText("第一步：點選「起點」開關或燈具；第二步：依序點擊折點與連線終點。");
      } else if (tool === 'double-wiring') {
        title = "正在繪製：雙切線路 (紅色波浪)";
        updateTipText("請點選雙控開關迴路起點，依序連線。");
      } else if (tool === 'strip-orange') {
        title = "正在繪製：鋁條燈 (橘粗線)";
        updateTipText("點選第一個點（起點）後，點選第二個點（終點）拉出條燈。");
      } else if (tool === 'strip-yellow') {
        title = "正在繪製：罩板燈 (黃粗線)";
        updateTipText("點選兩點定位反射間接照明燈條。");
      }
      drawModeLabel.innerText = title;
    }

    function cancelDrawMode() {
      state.activeDrawTool = null;
      state.tempWiringPoints = [];
      container.classList.remove('draw-mode');
      drawActions.style.display = 'none';
      updateTipText("提示：點擊元件可拖曳；點選任何元件按 Delete 即可刪除。");
      renderWiring();
    }

    function saveWiringConnection() {
      const validPoints = state.tempWiringPoints.filter(p => !p.isTemp);
      if (validPoints.length < 2) {
        showToast("配線折點不足", "warning");
        cancelDrawMode();
        return;
      }
      const firstPt = validPoints[0];
      const lastPt = validPoints[validPoints.length - 1];

      if (!firstPt.elementId || !lastPt.elementId) {
        showToast("配線的起點和終點必須都連結到元件上", "warning");
        cancelDrawMode();
        return;
      }

      state.connections.push({
        id: `con-${Date.now()}`,
        type: state.activeDrawTool,
        fromElementId: firstPt.elementId,
        toElementId: lastPt.elementId,
        points: validPoints.map(p => ({ x: p.x, y: p.y }))
      });
      showToast("配電路徑已儲存！", "success");
      cancelDrawMode();
    }

    function saveStripConnection() {
      const validPoints = state.tempWiringPoints.filter(p => !p.isTemp);
      if (validPoints.length < 2) {
        cancelDrawMode();
        return;
      }
      state.connections.push({
        id: `con-${Date.now()}`,
        type: state.activeDrawTool,
        points: [validPoints[0], validPoints[1]]
      });
      showToast("裝飾條燈配置完成！", "success");
      cancelDrawMode();
    }

    function resetView() {
      state.zoom = 0.85;
      state.panX = 0;
      state.panY = -40;
      updateViewport();
      showToast("已回復預設滿版視野", "info");
    }

    function updateTipText(text) {
      tipText.innerText = text;
      tipBar.classList.remove('opacity-0');
    }

    function showToast(text, type = 'success') {
      toastText.innerText = text;
      const icon = toast.querySelector('i');
      if (type === 'success') {
        icon.className = "fa-solid fa-circle-check text-emerald-400 text-lg";
      } else if (type === 'warning') {
        icon.className = "fa-solid fa-triangle-exclamation text-amber-400 text-lg";
      } else if (type === 'info') {
        icon.className = "fa-solid fa-circle-info text-blue-400 text-lg";
      }

      toast.classList.remove('opacity-0', 'translate-y-10');
      toast.classList.add('opacity-100', 'translate-y-0');

      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0');
        toast.classList.add('opacity-0', 'translate-y-10');
      }, 3500);
    }

    // 輸出儲存成純白底 JPG 檔案
    function exportLayoutAsJPG() {
      showToast("正在準備輸出高解析配置圖...", "info");

      const exportCanvas = document.createElement('canvas');
      exportCanvas.width = 800;
      exportCanvas.height = 960;
      const ctx = exportCanvas.getContext('2d');

      // 1. 純白底底色
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 800, 960);

      const renderLayers = () => {
        ctx.globalAlpha = 1.0;

        // 3. 繪製線路與燈條
        state.connections.forEach(conn => {
          let pts = [];
          if (conn.fromElementId && conn.toElementId) {
            const fromEl = state.elements.find(e => e.id === conn.fromElementId);
            const toEl = state.elements.find(e => e.id === conn.toElementId);
            if (fromEl && toEl) {
              pts = [{ x: fromEl.x, y: fromEl.y }];
              if (conn.points && conn.points.length > 2) {
                pts = pts.concat(conn.points.slice(1, -1));
              }
              pts.push({ x: toEl.x, y: toEl.y });
            } else {
              pts = conn.points;
            }
          } else {
            pts = conn.points;
          }

          if (!pts || pts.length < 2) return;

          if (conn.type === 'single-wiring' || conn.type === 'double-wiring') {
            const isDouble = conn.type === 'double-wiring';
            ctx.strokeStyle = isDouble ? '#ef4444' : '#1f2937';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            drawWavyPath(ctx, pts);
          } else if (conn.type === 'strip-orange') {
            ctx.strokeStyle = '#f97316';
            ctx.lineWidth = 6;
            ctx.lineCap = 'square';
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();
          } else if (conn.type === 'strip-yellow') {
            ctx.strokeStyle = '#facc15';
            ctx.lineWidth = 6;
            ctx.lineCap = 'square';
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();
          }
        });

        // 4. 繪製開關和燈具元件
        state.elements.forEach(el => {
          ctx.save();
          ctx.translate(el.x, el.y);

          if (el.type === 'light-7.5') {
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 2]);
            ctx.beginPath();
            ctx.moveTo(0, -10); ctx.lineTo(0, 10);
            ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
            ctx.stroke();
          } else if (el.type === 'light-9') {
            ctx.beginPath();
            ctx.arc(0, 0, 9, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = '#22c55e';
            ctx.fill();
          } else if (el.type === 'light-12') {
            ctx.beginPath();
            ctx.arc(0, 0, 11, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          } else if (el.type === 'light-pendant') {
            ctx.beginPath();
            ctx.arc(0, 0, 9, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -12); ctx.lineTo(0, 12);
            ctx.moveTo(-12, 0); ctx.lineTo(12, 0);
            ctx.stroke();
          } else if (el.type === 'switch-s' || el.type === 'switch-s3') {
            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#9ca3af';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = '#4b5563';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (el.type === 'switch-s') {
              ctx.fillText('S', 0, 0);
            } else {
              ctx.fillText('S', -2, 1);
              ctx.font = 'bold 8px Arial';
              ctx.fillText('3', 6, -3);
            }
          } else if (el.type === 'switch-new-s' || el.type === 'switch-new-s3') {
            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.fillStyle = '#fef2f2';
            ctx.fill();
            ctx.strokeStyle = '#f87171';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (el.type === 'switch-new-s') {
              ctx.fillText('S', 0, 0);
            } else {
              ctx.fillText('S', -2, 1);
              ctx.font = 'bold 9px Arial';
              ctx.fillText('3', 6, -3);
            }
          }
          ctx.restore();
        });

        // 匯出 JPG 下載
        const imgURL = exportCanvas.toDataURL('image/jpeg', 0.95);
        const link = document.createElement('a');
        link.download = `邱宅_燈光配置設計圖_${Date.now()}.jpg`;
        link.href = imgURL;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("JPG 檔案已下載成功！", "success");
      };

      // 2. 渲染 1212d.jpg 底圖作為背景 (利用 Image 物件)
      const bgImg = new Image();
      bgImg.crossOrigin = 'anonymous'; // 避免跨域
      bgImg.onload = function() {
        ctx.globalAlpha = state.bgOpacity;
        ctx.drawImage(bgImg, 0, 0, 800, 960);
        renderLayers();
      };
      bgImg.onerror = function() {
        // 若載入失敗，仍繪製圖形
        renderLayers();
      };
      bgImg.src = state.bgImageSrc;
    }
  </script>
