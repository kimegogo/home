<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>木府 燈具配置模擬器</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1612;
    --panel: #231f1b;
    --panel2: #2e2820;
    --border: rgba(255,220,160,0.15);
    --accent: #d4a660;
    --accent2: #e8c47a;
    --text: #f0e8d8;
    --muted: #a09070;
    --warm-glow: rgba(255, 210, 130, 1);
    --cool-light: rgba(220, 235, 255, 1);
    --led-strip: rgba(255, 200, 80, 1);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', 'Helvetica Neue', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 {
    font-size: 17px;
    font-weight: 500;
    color: var(--accent2);
    letter-spacing: 0.08em;
  }
  header span {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .main {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 53px);
  }
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    margin-top: 4px;
  }
  .circuit-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .circuit-card:hover { border-color: var(--accent); }
  .circuit-card.active { border-color: var(--accent2); }
  .circuit-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .circuit-name {
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .circuit-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .toggle-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .toggle-btn.on {
    border-color: var(--accent);
    color: var(--accent2);
    background: rgba(212,166,96,0.1);
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .slider-label {
    font-size: 11px;
    color: var(--muted);
    min-width: 40px;
  }
  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  .slider-val {
    font-size: 11px;
    color: var(--accent2);
    min-width: 32px;
    text-align: right;
  }
  .count-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 6px;
  }
  .count-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .count-btn:hover { border-color: var(--accent); color: var(--accent); }
  .count-display {
    font-size: 13px;
    color: var(--text);
    min-width: 20px;
    text-align: center;
  }
  .count-label {
    font-size: 11px;
    color: var(--muted);
  }
  .color-toggle {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .color-btn {
    padding: 3px 8px;
    font-size: 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }
  .color-btn.active { background: rgba(212,166,96,0.2); border-color: var(--accent); color: var(--accent2); }
  .canvas-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .view-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    background: var(--panel);
  }
  .view-tab {
    padding: 10px 18px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .view-tab.active {
    color: var(--accent2);
    border-bottom-color: var(--accent2);
  }
  .view-content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
  }
  .hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--muted);
    background: rgba(26,22,18,0.8);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    pointer-events: none;
    white-space: nowrap;
  }
  .circuit-switch-indicator {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>木府 · 燈具配置模擬器</h1>
  <span>260225 邱宅 平面配置圖</span>
</header>
<div class="main">
  <div class="sidebar">
    <div class="section-label">燈具迴路控制</div>

    <!-- Circuit A: Living room main recessed -->
    <div class="circuit-card active" id="card-A">
      <div class="circuit-header">
        <div class="circuit-name">
          <div class="circuit-dot" style="background:#e8b860"></div>
          迴路 A · 客廳主燈
        </div>
        <button class="toggle-btn on" id="toggle-A" onclick="toggleCircuit('A')">ON</button>
      </div>
      <div class="circuit-switch-indicator">3路開關 S₃ · 三組</div>
      <div class="count-row">
        <button class="count-btn" onclick="changeCount('A',-1)">−</button>
        <span class="count-display" id="count-A">6</span>
        <span class="count-label">顆 9cm 崁燈</span>
        <button class="count-btn" onclick="changeCount('A',1)">+</button>
      </div>
      <div class="slider-row">
        <span class="slider-label">亮度</span>
        <input type="range" min="0" max="100" value="80" id="bright-A" oninput="updateBrightness('A')">
        <span class="slider-val" id="bval-A">80%</span>
      </div>
      <div class="color-toggle">
        <button class="color-btn active" id="cA-warm" onclick="setColor('A','warm')">暖白 3000K</button>
        <button class="color-btn" id="cA-neutral" onclick="setColor('A','neutral')">中性 4000K</button>
        <button class="color-btn" id="cA-cool" onclick="setColor('A','cool')">冷白 6000K</button>
      </div>
    </div>

    <!-- Circuit B: Entry/dining recessed -->
    <div class="circuit-card" id="card-B">
      <div class="circuit-header">
        <div class="circuit-name">
          <div class="circuit-dot" style="background:#c87830"></div>
          迴路 B · 玄關/餐廳
        </div>
        <button class="toggle-btn on" id="toggle-B" onclick="toggleCircuit('B')">ON</button>
      </div>
      <div class="circuit-switch-indicator">單切開關 S · 兩組</div>
      <div class="count-row">
        <button class="count-btn" onclick="changeCount('B',-1)">−</button>
        <span class="count-display" id="count-B">4</span>
        <span class="count-label">顆 9cm 崁燈</span>
        <button class="count-btn" onclick="changeCount('B',1)">+</button>
      </div>
      <div class="slider-row">
        <span class="slider-label">亮度</span>
        <input type="range" min="0" max="100" value="70" id="bright-B" oninput="updateBrightness('B')">
        <span class="slider-val" id="bval-B">70%</span>
      </div>
      <div class="color-toggle">
        <button class="color-btn active" id="cB-warm" onclick="setColor('B','warm')">暖白 3000K</button>
        <button class="color-btn" id="cB-neutral" onclick="setColor('B','neutral')">中性 4000K</button>
        <button class="color-btn" id="cB-cool" onclick="setColor('B','cool')">冷白 6000K</button>
      </div>
    </div>

    <!-- Circuit C: LED strip TV cabinet -->
    <div class="circuit-card" id="card-C">
      <div class="circuit-header">
        <div class="circuit-name">
          <div class="circuit-dot" style="background:#f0a020"></div>
          迴路 C · 電視牆層板燈
        </div>
        <button class="toggle-btn on" id="toggle-C" onclick="toggleCircuit('C')">ON</button>
      </div>
      <div class="circuit-switch-indicator">層板燈 · LED 條燈</div>
      <div class="slider-row">
        <span class="slider-label">亮度</span>
        <input type="range" min="0" max="100" value="60" id="bright-C" oninput="updateBrightness('C')">
        <span class="slider-val" id="bval-C">60%</span>
      </div>
    </div>

    <!-- Circuit D: Left wall LED strip (鋁條燈) -->
    <div class="circuit-card" id="card-D">
      <div class="circuit-header">
        <div class="circuit-name">
          <div class="circuit-dot" style="background:#d4d890"></div>
          迴路 D · 壁面鋁條燈
        </div>
        <button class="toggle-btn on" id="toggle-D" onclick="toggleCircuit('D')">ON</button>
      </div>
      <div class="circuit-switch-indicator">鋁條燈 · 間接照明</div>
      <div class="slider-row">
        <span class="slider-label">亮度</span>
        <input type="range" min="0" max="100" value="50" id="bright-D" oninput="updateBrightness('D')">
        <span class="slider-val" id="bval-D">50%</span>
      </div>
    </div>

    <!-- Circuit E: Noguchi pendant -->
    <div class="circuit-card" id="card-E">
      <div class="circuit-header">
        <div class="circuit-name">
          <div class="circuit-dot" style="background:#e8d0a0"></div>
          野口勇 Akari 45A 吊燈
        </div>
        <button class="toggle-btn on" id="toggle-E" onclick="toggleCircuit('E')">ON</button>
      </div>
      <div class="circuit-switch-indicator">吊燈 · 餐廳主燈</div>
      <div class="slider-row">
        <span class="slider-label">亮度</span>
        <input type="range" min="0" max="100" value="75" id="bright-E" oninput="updateBrightness('E')">
        <span class="slider-val" id="bval-E">75%</span>
      </div>
    </div>

    <!-- Circuit F: Entry wall sconce -->
    <div class="circuit-card" id="card-F">
      <div class="circuit-header">
        <div class="circuit-name">
          <div class="circuit-dot" style="background:#b08060"></div>
          迴路 F · 門口壁燈
        </div>
        <button class="toggle-btn on" id="toggle-F" onclick="toggleCircuit('F')">ON</button>
      </div>
      <div class="circuit-switch-indicator">壁燈 · 玄關氛圍燈</div>
      <div class="slider-row">
        <span class="slider-label">亮度</span>
        <input type="range" min="0" max="100" value="60" id="bright-F" oninput="updateBrightness('F')">
        <span class="slider-val" id="bval-F">60%</span>
      </div>
    </div>

    <!-- Preset scenes -->
    <div class="section-label" style="margin-top:8px">情境預設</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <button class="color-btn" style="padding:8px;font-size:11px" onclick="setScene('full')">✦ 全開</button>
      <button class="color-btn" style="padding:8px;font-size:11px" onclick="setScene('relax')">◎ 休閒</button>
      <button class="color-btn" style="padding:8px;font-size:11px" onclick="setScene('dim')">◑ 夜燈</button>
      <button class="color-btn" style="padding:8px;font-size:11px" onclick="setScene('off')">○ 全關</button>
    </div>
  </div>

  <div class="canvas-area">
    <div class="view-tabs">
      <div class="view-tab active" id="tab-plan" onclick="switchView('plan')">平面配置圖</div>
      <div class="view-tab" id="tab-sim" onclick="switchView('sim')">客廳燈光模擬</div>
    </div>
    <div class="view-content">
      <canvas id="planCanvas"></canvas>
      <canvas id="simCanvas" style="display:none"></canvas>
      <div class="hint" id="hint-text">拖曳崁燈可移動位置 · 雙擊刪除</div>
    </div>
  </div>
</div>

<script>
const state = {
  circuits: {
    A: { on: true, brightness: 80, color: 'warm', count: 6 },
    B: { on: true, brightness: 70, color: 'warm', count: 4 },
    C: { on: true, brightness: 60, color: 'warm', count: 1 },
    D: { on: true, brightness: 50, color: 'warm', count: 1 },
    E: { on: true, brightness: 75, color: 'warm', count: 1 },
    F: { on: true, brightness: 60, color: 'warm', count: 1 },
  },
  view: 'plan',
  dragging: null,
  dragOffX: 0, dragOffY: 0,
};

const colorTemp = {
  warm: { r: 255, g: 190, b: 90 },
  neutral: { r: 255, g: 230, b: 180 },
  cool: { r: 210, g: 230, b: 255 },
};

// Plan layout coordinates (relative to canvas, will be scaled)
// Room layout: main living area roughly 600x450 in a ~800px wide canvas
let planLights = {
  A: [
    { x: 0.38, y: 0.32 }, { x: 0.52, y: 0.32 },
    { x: 0.38, y: 0.50 }, { x: 0.52, y: 0.50 },
    { x: 0.38, y: 0.68 }, { x: 0.52, y: 0.68 },
  ],
  B: [
    { x: 0.22, y: 0.32 }, { x: 0.22, y: 0.50 },
    { x: 0.72, y: 0.58 }, { x: 0.84, y: 0.58 },
  ],
  E: [{ x: 0.44, y: 0.80 }],
};

let currentView = 'plan';
let planW, planH, simW, simH;
const planCanvas = document.getElementById('planCanvas');
const simCanvas = document.getElementById('simCanvas');
const planCtx = planCanvas.getContext('2d');
const simCtx = simCanvas.getContext('2d');

function resize() {
  const area = document.querySelector('.view-content');
  const w = area.clientWidth;
  const h = area.clientHeight;
  planCanvas.width = w; planCanvas.height = h;
  simCanvas.width = w; simCanvas.height = h;
  planW = w; planH = h; simW = w; simH = h;
  render();
}

function getColor(circuit, alpha) {
  const c = state.circuits[circuit];
  const t = colorTemp[c.color || 'warm'];
  const b = (c.on ? c.brightness : 0) / 100;
  return `rgba(${t.r},${t.g},${t.b},${alpha * b})`;
}

function getLightColor(circuit) {
  const c = state.circuits[circuit];
  if (!c.on) return null;
  return colorTemp[c.color || 'warm'];
}

function drawPlan() {
  const ctx = planCtx;
  const W = planW, H = planH;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#1e1a15';
  ctx.fillRect(0, 0, W, H);

  const S = Math.min(W, H);
  const ox = (W - S * 0.92) / 2;
  const oy = (H - S * 0.85) / 2;
  const sw = S * 0.92, sh = S * 0.85;

  // Draw simplified floor plan
  ctx.strokeStyle = 'rgba(200,180,140,0.5)';
  ctx.lineWidth = 2;

  // Outer walls - main L-shaped unit
  // Main living + bedroom block
  ctx.beginPath();
  // Main living room (left big block)
  const rx = ox, ry = oy;
  const rw = sw * 0.62, rh = sh * 0.72;
  ctx.strokeRect(rx + sw*0.05, ry + sh*0.05, rw, rh);
  // Bedroom (upper right)
  ctx.strokeRect(rx + sw*0.62, ry + sh*0.05, sw*0.33, sh*0.48);
  // Lower right (bathroom + room)
  ctx.strokeRect(rx + sw*0.47, ry + sh*0.62, sw*0.48, sh*0.32);
  ctx.stroke();

  // Room fill
  ctx.fillStyle = 'rgba(40,34,26,0.9)';
  ctx.fillRect(rx + sw*0.05+1, ry + sh*0.05+1, rw-2, rh-2);
  ctx.fillRect(rx + sw*0.62+1, ry + sh*0.05+1, sw*0.33-2, sh*0.48-2);
  ctx.fillRect(rx + sw*0.47+1, ry + sh*0.62+1, sw*0.48-2, sh*0.32-2);

  // Room labels
  ctx.fillStyle = 'rgba(160,140,100,0.4)';
  ctx.font = `${Math.max(10, S*0.016)}px Noto Sans TC, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('客廳', rx + sw*0.05 + rw*0.5, ry + sh*0.05 + rh*0.35);
  ctx.fillText('主臥', rx + sw*0.62 + sw*0.165, ry + sh*0.05 + sh*0.24);
  ctx.fillText('次臥/廁所', rx + sw*0.71, ry + sh*0.62 + sh*0.16);

  // TV wall indicator
  ctx.fillStyle = 'rgba(212,166,96,0.15)';
  ctx.fillRect(rx + sw*0.28, ry + sh*0.05 + 2, sw*0.25, sh*0.04);
  ctx.fillStyle = 'rgba(212,166,96,0.5)';
  ctx.font = `${Math.max(9, S*0.013)}px Noto Sans TC`;
  ctx.fillText('電視牆', rx + sw*0.405, ry + sh*0.05 + sh*0.03);

  // Draw LED strips
  // D: Left wall strip
  if (state.circuits.D.on && state.circuits.D.brightness > 0) {
    const b = state.circuits.D.brightness / 100;
    const grad = ctx.createLinearGradient(rx + sw*0.07, 0, rx + sw*0.12, 0);
    grad.addColorStop(0, `rgba(255,220,100,${b*0.6})`);
    grad.addColorStop(1, `rgba(255,220,100,0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(rx + sw*0.05, ry + sh*0.12, sw*0.05, sh*0.55);
    ctx.strokeStyle = `rgba(255,200,60,${b*0.8})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(rx + sw*0.06, ry + sh*0.12);
    ctx.lineTo(rx + sw*0.06, ry + sh*0.67);
    ctx.stroke();
  }
  // C: TV cabinet strip
  if (state.circuits.C.on && state.circuits.C.brightness > 0) {
    const b = state.circuits.C.brightness / 100;
    const tvX = rx + sw*0.28, tvY = ry + sh*0.07;
    const grad2 = ctx.createLinearGradient(0, tvY, 0, tvY + sh*0.05);
    grad2.addColorStop(0, `rgba(255,210,80,${b*0.7})`);
    grad2.addColorStop(1, `rgba(255,210,80,0)`);
    ctx.fillStyle = grad2;
    ctx.fillRect(tvX, tvY, sw*0.25, sh*0.06);
    ctx.strokeStyle = `rgba(255,190,50,${b*0.9})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tvX, tvY + 4);
    ctx.lineTo(tvX + sw*0.25, tvY + 4);
    ctx.stroke();
  }

  // Draw recessed lights with glow
  const drawRecessed = (lx, ly, circuit, label) => {
    const c = state.circuits[circuit];
    const b = c.on ? c.brightness / 100 : 0;
    const t = colorTemp[c.color || 'warm'];
    const r = Math.max(6, S * 0.012);

    if (b > 0) {
      const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, r * 5);
      glow.addColorStop(0, `rgba(${t.r},${t.g},${t.b},${b * 0.35})`);
      glow.addColorStop(1, `rgba(${t.r},${t.g},${t.b},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(lx, ly, r * 5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.beginPath();
    ctx.arc(lx, ly, r, 0, Math.PI * 2);
    ctx.fillStyle = b > 0 ? `rgba(${t.r},${t.g},${t.b},${0.4 + b * 0.6})` : 'rgba(60,50,40,0.8)';
    ctx.fill();
    ctx.strokeStyle = b > 0 ? `rgba(${t.r},${t.g},${t.b},0.8)` : 'rgba(120,100,70,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Inner ring
    ctx.beginPath();
    ctx.arc(lx, ly, r * 0.5, 0, Math.PI * 2);
    ctx.strokeStyle = b > 0 ? `rgba(255,255,255,${b * 0.5})` : 'rgba(80,60,40,0.5)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  };

  // Circuit A lights
  const alights = planLights.A.slice(0, state.circuits.A.count);
  alights.forEach(l => {
    drawRecessed(rx + l.x * sw, ry + l.y * sh, 'A');
  });

  // Circuit B lights
  const blights = planLights.B.slice(0, state.circuits.B.count);
  blights.forEach(l => {
    drawRecessed(rx + l.x * sw, ry + l.y * sh, 'B');
  });

  // Noguchi pendant (E)
  {
    const lx = rx + planLights.E[0].x * sw;
    const ly = ry + planLights.E[0].y * sh;
    const c = state.circuits.E;
    const b = c.on ? c.brightness / 100 : 0;
    if (b > 0) {
      const glow = ctx.createRadialGradient(lx, ly, 0, lx, ly, S * 0.06);
      glow.addColorStop(0, `rgba(255,230,160,${b * 0.4})`);
      glow.addColorStop(1, `rgba(255,200,80,0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(lx, ly, S * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
    // Pendant body (oval)
    ctx.save();
    ctx.translate(lx, ly);
    ctx.scale(1.6, 1);
    ctx.beginPath();
    ctx.arc(0, 0, S * 0.018, 0, Math.PI * 2);
    ctx.fillStyle = b > 0 ? `rgba(255,230,160,${0.3 + b * 0.5})` : 'rgba(80,60,40,0.6)';
    ctx.fill();
    ctx.strokeStyle = b > 0 ? `rgba(255,210,120,0.9)` : 'rgba(100,80,50,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
    // Label
    ctx.fillStyle = 'rgba(200,170,90,0.7)';
    ctx.font = `${Math.max(8, S * 0.011)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('野口勇', lx, ly + S * 0.03);
  }

  // Wall sconce F
  {
    const lx = rx + sw * 0.07;
    const ly = ry + sh * 0.88;
    const c = state.circuits.F;
    const b = c.on ? c.brightness / 100 : 0;
    if (b > 0) {
      const glow = ctx.createRadialGradient(lx, ly, 0, lx + 20, ly, S * 0.05);
      glow.addColorStop(0, `rgba(255,200,120,${b * 0.5})`);
      glow.addColorStop(1, 'rgba(255,180,80,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(lx, ly, S * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(lx, ly, S * 0.012, 0, Math.PI * 2);
    ctx.fillStyle = b > 0 ? `rgba(255,210,130,${0.4 + b * 0.5})` : 'rgba(70,55,40,0.7)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(200,150,80,0.7)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.fillStyle = 'rgba(180,140,70,0.6)';
    ctx.font = `${Math.max(8, S * 0.011)}px sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillText('壁燈', lx + S * 0.015, ly + S * 0.005);
  }

  // Legend
  const legX = ox + 8, legY = oy + 8;
  const legItems = [
    { color: '#e8b860', label: '迴路A 客廳', circuit: 'A' },
    { color: '#c87830', label: '迴路B 玄關', circuit: 'B' },
    { color: '#f0a020', label: '迴路C 層板燈', circuit: 'C' },
    { color: '#d4d890', label: '迴路D 鋁條燈', circuit: 'D' },
    { color: '#e8d0a0', label: '野口勇吊燈', circuit: 'E' },
    { color: '#b08060', label: '迴路F 壁燈', circuit: 'F' },
  ];
  ctx.font = `${Math.max(9, S*0.013)}px Noto Sans TC, sans-serif`;
  legItems.forEach((item, i) => {
    const c = state.circuits[item.circuit];
    const alpha = c.on ? 1 : 0.3;
    ctx.fillStyle = item.color;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(legX + 6, legY + 12 + i * 18, 5, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = 'rgba(200,180,140,0.8)';
    ctx.textAlign = 'left';
    ctx.fillText(item.label, legX + 16, legY + 16 + i * 18);
    ctx.globalAlpha = 1;
  });

  // Switch group labels
  ctx.fillStyle = 'rgba(200,160,80,0.3)';
  ctx.font = `${Math.max(8, S*0.011)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('S₃', rx + sw*0.33, ry + sh*0.48);
  ctx.fillText('S₃', rx + sw*0.33, ry + sh*0.56);
  ctx.fillText('S₃', rx + sw*0.33, ry + sh*0.64);
}

function drawSimulation() {
  const ctx = simCtx;
  const W = simW, H = simH;
  ctx.clearRect(0, 0, W, H);

  // Dark room background
  ctx.fillStyle = '#0d0a07';
  ctx.fillRect(0, 0, W, H);

  // Room perspective: floor, back wall, side walls
  const floorY = H * 0.65;
  const vanX = W * 0.5, vanY = H * 0.38;
  const roomW = W * 0.85;
  const roomLeft = (W - roomW) / 2;

  // Floor
  const floorGrad = ctx.createLinearGradient(0, floorY, 0, H);
  floorGrad.addColorStop(0, '#2a2218');
  floorGrad.addColorStop(1, '#1a1510');
  ctx.fillStyle = floorGrad;
  ctx.beginPath();
  ctx.moveTo(roomLeft, H);
  ctx.lineTo(roomLeft, floorY);
  ctx.lineTo(W - roomLeft, floorY);
  ctx.lineTo(W - roomLeft, H);
  ctx.fill();

  // Back wall
  const wallGrad = ctx.createLinearGradient(0, 0, 0, floorY);
  wallGrad.addColorStop(0, '#181410');
  wallGrad.addColorStop(1, '#201c16');
  ctx.fillStyle = wallGrad;
  ctx.beginPath();
  ctx.moveTo(roomLeft, floorY);
  ctx.lineTo(vanX - W*0.3, vanY * 0.1);
  ctx.lineTo(vanX + W*0.3, vanY * 0.1);
  ctx.lineTo(W - roomLeft, floorY);
  ctx.fill();

  // Left wall
  ctx.fillStyle = '#161210';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(roomLeft, floorY);
  ctx.lineTo(vanX - W*0.3, vanY * 0.1);
  ctx.lineTo(0, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(roomLeft, H);
  ctx.lineTo(roomLeft, floorY);
  ctx.fill();

  // Right wall
  ctx.fillStyle = '#14100e';
  ctx.beginPath();
  ctx.moveTo(W, 0);
  ctx.lineTo(W - roomLeft, floorY);
  ctx.lineTo(vanX + W*0.3, vanY * 0.1);
  ctx.lineTo(W, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(W, 0);
  ctx.lineTo(W - roomLeft, H);
  ctx.lineTo(W - roomLeft, floorY);
  ctx.fill();

  // Ceiling
  ctx.fillStyle = '#1a1612';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(W, 0);
  ctx.lineTo(vanX + W*0.3, vanY*0.1);
  ctx.lineTo(vanX - W*0.3, vanY*0.1);
  ctx.fill();

  // TV wall feature - walnut wood panel
  const tvWallX = vanX - W*0.3 + W*0.02;
  const tvWallW = W*0.56;
  const tvWallTop = vanY * 0.1;
  const tvWallBot = floorY;

  // Wood panel color
  ctx.fillStyle = '#3d2818';
  ctx.fillRect(tvWallX, tvWallTop, tvWallW * 0.28, tvWallBot - tvWallTop);

  // Cream wall area for TV
  ctx.fillStyle = '#2a2420';
  ctx.fillRect(tvWallX + tvWallW*0.28, tvWallTop, tvWallW*0.72, tvWallBot - tvWallTop);

  // TV cabinet (floating)
  const cabY = floorY - (tvWallBot - tvWallTop)*0.28;
  const cabH = (tvWallBot - tvWallTop)*0.12;
  ctx.fillStyle = '#2e1f0f';
  ctx.fillRect(tvWallX + tvWallW*0.3, cabY, tvWallW*0.62, cabH);

  // LED strip under cabinet (Circuit C)
  if (state.circuits.C.on && state.circuits.C.brightness > 0) {
    const b = state.circuits.C.brightness / 100;
    const ledGrad = ctx.createLinearGradient(0, cabY + cabH, 0, floorY);
    ledGrad.addColorStop(0, `rgba(255,200,80,${b * 0.7})`);
    ledGrad.addColorStop(0.3, `rgba(255,180,60,${b * 0.3})`);
    ledGrad.addColorStop(1, `rgba(255,150,40,0)`);
    ctx.fillStyle = ledGrad;
    ctx.fillRect(tvWallX + tvWallW*0.3, cabY + cabH, tvWallW*0.62, floorY - cabY - cabH);

    // Strip light itself
    ctx.fillStyle = `rgba(255,220,100,${b})`;
    ctx.fillRect(tvWallX + tvWallW*0.3, cabY + cabH, tvWallW*0.62, 2);
  }

  // TV screen
  const tvX = tvWallX + tvWallW*0.38;
  const tvY2 = cabY - (tvWallBot - tvWallTop)*0.38;
  const tvW = tvWallW * 0.42, tvH2 = (tvWallBot - tvWallTop) * 0.3;
  ctx.fillStyle = '#080604';
  ctx.fillRect(tvX, tvY2, tvW, tvH2);
  ctx.strokeStyle = '#1a1410';
  ctx.lineWidth = 1;
  ctx.strokeRect(tvX, tvY2, tvW, tvH2);

  // Left wall strip (Circuit D)
  if (state.circuits.D.on && state.circuits.D.brightness > 0) {
    const b = state.circuits.D.brightness / 100;
    const stripGrad = ctx.createRadialGradient(roomLeft + 15, H * 0.4, 0, roomLeft + 60, H * 0.4, W * 0.15);
    stripGrad.addColorStop(0, `rgba(255,210,100,${b * 0.5})`);
    stripGrad.addColorStop(1, 'rgba(255,180,60,0)');
    ctx.fillStyle = stripGrad;
    ctx.fillRect(0, H * 0.1, W * 0.2, H * 0.6);
    ctx.fillStyle = `rgba(255,200,80,${b})`;
    ctx.fillRect(roomLeft, H * 0.15, 2, H * 0.52);
  }

  // Ceiling recessed lights - Circuit A
  const cA = state.circuits.A;
  const aLights = [
    { cx: 0.38, cy: 0.08 }, { cx: 0.50, cy: 0.08 },
    { cx: 0.38, cy: 0.05 }, { cx: 0.50, cy: 0.05 },
    { cx: 0.38, cy: 0.03 }, { cx: 0.50, cy: 0.03 },
  ].slice(0, cA.count);

  aLights.forEach(l => {
    const lx = W * l.cx;
    const ly = H * l.cy;
    const b = cA.on ? cA.brightness / 100 : 0;
    const t = colorTemp[cA.color || 'warm'];

    // Ceiling hole
    ctx.fillStyle = '#0a0806';
    ctx.beginPath();
    ctx.arc(lx, ly, 6, 0, Math.PI*2);
    ctx.fill();

    if (b > 0) {
      // Light cone onto floor
      const coneX = lx + (lx - W*0.5) * 0.3;
      const coneY = floorY + (H - floorY) * 0.2;
      const coneGrad = ctx.createRadialGradient(lx, ly, 0, coneX, coneY, H * 0.35);
      coneGrad.addColorStop(0, `rgba(${t.r},${t.g},${t.b},${b * 0.25})`);
      coneGrad.addColorStop(0.4, `rgba(${t.r},${t.g},${t.b},${b * 0.12})`);
      coneGrad.addColorStop(1, `rgba(${t.r},${t.g},${t.b},0)`);
      ctx.fillStyle = coneGrad;
      ctx.beginPath();
      ctx.arc(coneX, coneY, H * 0.35, 0, Math.PI*2);
      ctx.fill();

      // Bright center glow on ceiling
      const glowGrad = ctx.createRadialGradient(lx, ly, 0, lx, ly, 30);
      glowGrad.addColorStop(0, `rgba(${t.r},${t.g},${t.b},${b * 0.9})`);
      glowGrad.addColorStop(0.3, `rgba(${t.r},${t.g},${t.b},${b * 0.4})`);
      glowGrad.addColorStop(1, `rgba(${t.r},${t.g},${t.b},0)`);
      ctx.fillStyle = glowGrad;
      ctx.beginPath();
      ctx.arc(lx, ly, 30, 0, Math.PI*2);
      ctx.fill();

      // Bright dot
      ctx.fillStyle = `rgba(255,255,240,${b})`;
      ctx.beginPath();
      ctx.arc(lx, ly, 3, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // Circuit B lights (smaller, entry area - right side)
  const cB = state.circuits.B;
  const bLights = [
    { cx: 0.74, cy: 0.04 }, { cx: 0.82, cy: 0.04 },
    { cx: 0.74, cy: 0.07 }, { cx: 0.82, cy: 0.07 },
  ].slice(0, cB.count);

  bLights.forEach(l => {
    const lx = W * l.cx;
    const ly = H * l.cy;
    const b = cB.on ? cB.brightness / 100 : 0;
    const t = colorTemp[cB.color || 'warm'];

    ctx.fillStyle = '#0a0806';
    ctx.beginPath();
    ctx.arc(lx, ly, 5, 0, Math.PI*2);
    ctx.fill();

    if (b > 0) {
      const coneGrad = ctx.createRadialGradient(lx, ly + 30, 0, lx, floorY, H * 0.28);
      coneGrad.addColorStop(0, `rgba(${t.r},${t.g},${t.b},${b * 0.2})`);
      coneGrad.addColorStop(1, `rgba(${t.r},${t.g},${t.b},0)`);
      ctx.fillStyle = coneGrad;
      ctx.beginPath();
      ctx.arc(lx, floorY, H * 0.28, 0, Math.PI*2);
      ctx.fill();

      ctx.fillStyle = `rgba(255,255,240,${b})`;
      ctx.beginPath();
      ctx.arc(lx, ly, 2.5, 0, Math.PI*2);
      ctx.fill();
    }
  });

  // Noguchi pendant (E)
  {
    const cE = state.circuits.E;
    const b = cE.on ? cE.brightness / 100 : 0;
    const lx = W * 0.28, ly = H * 0.32;
    const pendR = Math.min(W, H) * 0.055;

    // Pendant wire
    ctx.strokeStyle = 'rgba(100,80,50,0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(lx, 0);
    ctx.lineTo(lx, ly - pendR);
    ctx.stroke();

    // Noguchi paper lantern glow
    if (b > 0) {
      const outerGlow = ctx.createRadialGradient(lx, ly, 0, lx, ly, pendR * 4);
      outerGlow.addColorStop(0, `rgba(255,230,160,${b * 0.3})`);
      outerGlow.addColorStop(1, 'rgba(255,200,80,0)');
      ctx.fillStyle = outerGlow;
      ctx.beginPath();
      ctx.ellipse(lx, ly, pendR * 4, pendR * 3, 0, 0, Math.PI*2);
      ctx.fill();

      // Light pool on floor
      const floorPool = ctx.createRadialGradient(lx, floorY, 0, lx, floorY, H * 0.25);
      floorPool.addColorStop(0, `rgba(255,220,140,${b * 0.4})`);
      floorPool.addColorStop(0.5, `rgba(255,200,100,${b * 0.15})`);
      floorPool.addColorStop(1, 'rgba(255,180,60,0)');
      ctx.fillStyle = floorPool;
      ctx.beginPath();
      ctx.ellipse(lx, floorY, H * 0.25, H * 0.06, 0, 0, Math.PI*2);
      ctx.fill();
    }

    // Paper lantern body
    ctx.save();
    ctx.translate(lx, ly);
    ctx.scale(1, 1.4);
    const bodyGrad = ctx.createRadialGradient(pendR * 0.2, -pendR * 0.1, 0, 0, 0, pendR);
    if (b > 0) {
      bodyGrad.addColorStop(0, `rgba(255,240,200,${0.6 + b * 0.3})`);
      bodyGrad.addColorStop(0.6, `rgba(255,210,140,${0.3 + b * 0.4})`);
      bodyGrad.addColorStop(1, `rgba(200,160,80,${0.2 + b * 0.2})`);
    } else {
      bodyGrad.addColorStop(0, 'rgba(80,65,45,0.6)');
      bodyGrad.addColorStop(1, 'rgba(50,40,25,0.4)');
    }
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.arc(0, 0, pendR, 0, Math.PI*2);
    ctx.fill();
    // Ribs
    if (b > 0) {
      ctx.strokeStyle = `rgba(180,140,80,${b * 0.3})`;
      ctx.lineWidth = 0.5;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * pendR, Math.sin(a) * pendR);
        ctx.stroke();
      }
    }
    ctx.restore();

    // Label
    ctx.fillStyle = 'rgba(200,170,100,0.5)';
    ctx.font = `${Math.max(9, H*0.015)}px Noto Sans TC, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('Akari 45A', lx, ly + pendR * 1.6 + 14);
  }

  // Wall sconce F
  {
    const cF = state.circuits.F;
    const b = cF.on ? cF.brightness / 100 : 0;
    const sx = roomLeft + 20, sy = H * 0.5;

    if (b > 0) {
      const sGrad = ctx.createRadialGradient(sx + 10, sy, 0, sx + 60, sy, W * 0.12);
      sGrad.addColorStop(0, `rgba(255,200,100,${b * 0.6})`);
      sGrad.addColorStop(1, 'rgba(255,170,60,0)');
      ctx.fillStyle = sGrad;
      ctx.beginPath();
      ctx.arc(sx + 40, sy, W * 0.1, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle = b > 0 ? `rgba(255,200,120,${0.5 + b * 0.4})` : 'rgba(60,45,30,0.6)';
    ctx.fillRect(sx - 4, sy - 10, 8, 20);
    ctx.fillStyle = b > 0 ? `rgba(255,220,150,${b * 0.8})` : 'rgba(50,40,25,0.5)';
    ctx.beginPath();
    ctx.arc(sx + 4, sy, 8, -Math.PI/2, Math.PI/2);
    ctx.fill();
  }

  // Sofa silhouette
  ctx.fillStyle = 'rgba(45,38,28,0.9)';
  const sofaX = W * 0.62, sofaY = floorY;
  ctx.fillRect(sofaX, sofaY - H * 0.12, W * 0.28, H * 0.12);
  ctx.fillRect(sofaX - W * 0.02, sofaY - H * 0.16, W * 0.02, H * 0.16);
  ctx.fillRect(sofaX + W * 0.28, sofaY - H * 0.16, W * 0.02, H * 0.16);

  // Coffee table
  ctx.fillStyle = 'rgba(60,40,20,0.8)';
  ctx.fillRect(W * 0.52, floorY - H * 0.03, W * 0.14, H * 0.03);

  // Info overlay
  const activeCircuits = Object.entries(state.circuits).filter(([,c]) => c.on);
  ctx.fillStyle = 'rgba(200,170,110,0.5)';
  ctx.font = `${Math.max(9, H*0.014)}px Noto Sans TC, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText(`${activeCircuits.length} 個迴路開啟`, 20, H - 20);
}

function render() {
  if (currentView === 'plan') drawPlan();
  else drawSimulation();
}

function toggleCircuit(id) {
  const c = state.circuits[id];
  c.on = !c.on;
  const btn = document.getElementById('toggle-' + id);
  btn.textContent = c.on ? 'ON' : 'OFF';
  btn.className = 'toggle-btn' + (c.on ? ' on' : '');
  render();
}

function updateBrightness(id) {
  const slider = document.getElementById('bright-' + id);
  const val = parseInt(slider.value);
  state.circuits[id].brightness = val;
  document.getElementById('bval-' + id).textContent = val + '%';
  render();
}

function setColor(id, color) {
  state.circuits[id].color = color;
  ['warm','neutral','cool'].forEach(c => {
    const btn = document.getElementById('c' + id + '-' + c);
    if (btn) btn.className = 'color-btn' + (c === color ? ' active' : '');
  });
  render();
}

function changeCount(id, delta) {
  const c = state.circuits[id];
  const maxCounts = { A: 8, B: 6 };
  const max = maxCounts[id] || 1;
  const arr = id === 'A' ? planLights.A : planLights.B;
  c.count = Math.max(1, Math.min(max, c.count + delta));

  // Add default positions if needed
  while (arr.length < c.count) {
    const row = Math.floor(arr.length / 2);
    const col = arr.length % 2;
    arr.push({ x: 0.35 + col * 0.17, y: 0.25 + row * 0.18 });
  }

  document.getElementById('count-' + id).textContent = c.count;
  render();
}

function setScene(scene) {
  const scenes = {
    full: { A: [true,80], B: [true,80], C: [true,70], D: [true,60], E: [true,80], F: [true,70] },
    relax: { A: [true,40], B: [false,0], C: [true,50], D: [true,40], E: [true,60], F: [true,50] },
    dim: { A: [false,0], B: [false,0], C: [false,0], D: [true,20], E: [false,0], F: [true,30] },
    off: { A: [false,0], B: [false,0], C: [false,0], D: [false,0], E: [false,0], F: [false,0] },
  };
  const s = scenes[scene];
  Object.entries(s).forEach(([id, [on, bright]]) => {
    state.circuits[id].on = on;
    state.circuits[id].brightness = bright;
    const btn = document.getElementById('toggle-' + id);
    btn.textContent = on ? 'ON' : 'OFF';
    btn.className = 'toggle-btn' + (on ? ' on' : '');
    document.getElementById('bright-' + id).value = bright;
    document.getElementById('bval-' + id).textContent = bright + '%';
  });
  render();
}

function switchView(v) {
  currentView = v;
  planCanvas.style.display = v === 'plan' ? 'block' : 'none';
  simCanvas.style.display = v === 'sim' ? 'block' : 'none';
  document.getElementById('tab-plan').className = 'view-tab' + (v === 'plan' ? ' active' : '');
  document.getElementById('tab-sim').className = 'view-tab' + (v === 'sim' ? ' active' : '');
  document.getElementById('hint-text').textContent = v === 'plan' ? '拖曳崁燈可移動位置 · 雙擊刪除' : '即時燈光模擬視圖';
  render();
}

// Drag for plan view
let dragLight = null;
planCanvas.addEventListener('mousedown', e => {
  if (currentView !== 'plan') return;
  const rect = planCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const S = Math.min(planW, planH);
  const ox = (planW - S * 0.92) / 2, oy = (planH - S * 0.85) / 2;
  const sw = S * 0.92, sh = S * 0.85;
  const r = Math.max(6, S * 0.012) * 1.5;

  for (const [cid, lights] of Object.entries(planLights)) {
    const count = cid === 'A' ? state.circuits.A.count : cid === 'B' ? state.circuits.B.count : 1;
    const arr = lights.slice(0, count);
    for (let i = 0; i < arr.length; i++) {
      const lx = ox + arr[i].x * sw;
      const ly = oy + arr[i].y * sh;
      if (Math.hypot(mx - lx, my - ly) < r) {
        dragLight = { cid, idx: i };
        return;
      }
    }
  }
});

planCanvas.addEventListener('mousemove', e => {
  if (!dragLight || currentView !== 'plan') return;
  const rect = planCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const S = Math.min(planW, planH);
  const ox = (planW - S * 0.92) / 2, oy = (planH - S * 0.85) / 2;
  const sw = S * 0.92, sh = S * 0.85;
  planLights[dragLight.cid][dragLight.idx].x = (mx - ox) / sw;
  planLights[dragLight.cid][dragLight.idx].y = (my - oy) / sh;
  render();
});

planCanvas.addEventListener('mouseup', () => { dragLight = null; });
planCanvas.addEventListener('mouseleave', () => { dragLight = null; });

planCanvas.addEventListener('dblclick', e => {
  if (currentView !== 'plan') return;
  const rect = planCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const S = Math.min(planW, planH);
  const ox = (planW - S * 0.92) / 2, oy = (planH - S * 0.85) / 2;
  const sw = S * 0.92, sh = S * 0.85;
  const r = Math.max(6, S * 0.012) * 1.5;

  for (const [cid, lights] of Object.entries(planLights)) {
    const count = cid === 'A' ? state.circuits.A.count : cid === 'B' ? state.circuits.B.count : 1;
    for (let i = 0; i < count; i++) {
      const lx = ox + lights[i].x * sw;
      const ly = oy + lights[i].y * sh;
      if (Math.hypot(mx - lx, my - ly) < r && (cid === 'A' || cid === 'B')) {
        lights.splice(i, 1);
        if (cid === 'A') state.circuits.A.count = Math.max(1, state.circuits.A.count - 1);
        if (cid === 'B') state.circuits.B.count = Math.max(1, state.circuits.B.count - 1);
        document.getElementById('count-' + cid).textContent = state.circuits[cid].count;
        render();
        return;
      }
    }
  }
});

window.addEventListener('resize', resize);
resize();
</script>
</body>
