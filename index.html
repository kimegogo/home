<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>邱宅燈光配置互動設計系統</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome Icons for UI -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }
    /* 隱藏所有全域滾動條，確保單頁體驗 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #ffffff;
    }
    /* 精緻捲軸樣式（僅限左側面板） */
    .sidebar-scroll::-webkit-scrollbar {
      width: 5px;
    }
    .sidebar-scroll::-webkit-scrollbar-track {
      background: #f8fafc;
    }
    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }
    .sidebar-scroll::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
    .canvas-container {
      cursor: default;
      transition: transform 0.1s ease-out;
    }
    .canvas-container.draw-mode {
      cursor: crosshair;
    }
    .canvas-container.pan-mode {
      cursor: grab;
    }
    .canvas-container.pan-mode:active {
      cursor: grabbing;
    }
    /* 點選中元件時的外框動畫 */
    .selected-element-glow {
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.8), 0 0 12px rgba(99, 102, 241, 0.5);
      animation: pulse-glow 1.5s infinite;
    }
    @keyframes pulse-glow {
      0% { box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.8); }
      50% { box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.5), 0 0 8px rgba(99, 102, 241, 0.3); }
      100% { box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.8); }
    }
  </style>
</head>
<body class="text-slate-800 flex flex-col h-screen">

  <!-- 頂部導覽列 (固定高度 56px) -->
  <header class="h-14 bg-slate-900 text-white px-5 flex items-center justify-between shadow-md z-30 flex-shrink-0">
    <div class="flex items-center space-x-3">
      <div class="bg-amber-500 text-slate-950 p-1.5 rounded-lg font-bold flex items-center justify-center">
        <i class="fa-solid fa-lightbulb text-lg"></i>
      </div>
      <div>
        <h1 class="text-md font-bold tracking-wider flex items-center">
          邱宅燈光配置互動設計系統 
          <span class="ml-2 text-[10px] bg-indigo-600 text-indigo-100 px-1.5 py-0.5 rounded font-normal">100% 一頁完成版</span>
        </h1>
        <p class="text-[10px] text-slate-400">專為 Chrome 100% 設計之直式戶型智慧配置畫布</p>
      </div>
    </div>
    
    <div class="flex items-center space-x-2">
      <!-- 重新定位 -->
      <button id="btn-recenter" class="flex items-center space-x-1 bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 px-3 py-1.5 rounded-lg text-xs font-medium transition shadow-sm">
        <i class="fa-solid fa-align-center"></i>
        <span>重設底圖置中</span>
      </button>

      <!-- 重置配置 -->
      <button id="btn-reset" class="flex items-center space-x-1 bg-red-950/40 hover:bg-red-900/40 text-red-300 border border-red-900/40 px-3 py-1.5 rounded-lg text-xs font-medium transition shadow-sm">
        <i class="fa-solid fa-arrow-rotate-left"></i>
        <span>清空重置</span>
      </button>

      <!-- 儲存為 JPG -->
      <button id="btn-export" class="flex items-center space-x-1.5 bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-1.5 rounded-lg text-xs font-semibold transition shadow-sm shadow-emerald-950/20">
        <i class="fa-solid fa-file-image text-sm"></i>
        <span>儲存為 JPG 檔案</span>
      </button>
    </div>
  </header>

  <!-- 主要工作區 (高度自適應剩餘空間，100%無滾動) -->
  <div class="flex flex-1 overflow-hidden relative">
    
    <!-- 左側工具欄 (寬度 310px，固定不變) -->
    <aside class="w-[310px] bg-slate-50 border-r border-slate-200 flex flex-col flex-shrink-0 z-20">
      
      <!-- 滑鼠操作模式與鎖定 -->
      <div class="p-3 bg-white border-b border-slate-200 space-y-2">
        <div class="flex items-center justify-between">
          <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider">滑鼠操作工具</h2>
          <!-- 鎖定畫布功能 -->
          <button id="btn-lock-canvas" class="text-[10px] flex items-center space-x-1 px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-100 transition">
            <i class="fa-solid fa-unlock text-[8px]" id="icon-lock"></i>
            <span id="text-lock">未鎖定畫布</span>
          </button>
        </div>
        <div class="grid grid-cols-2 gap-1.5">
          <button id="tool-select" class="flex items-center justify-center space-x-1.5 py-2 px-2 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-semibold text-xs transition">
            <i class="fa-solid fa-arrow-pointer"></i>
            <span>選取拖曳</span>
          </button>
          <button id="tool-pan" class="flex items-center justify-center space-x-1.5 py-2 px-2 rounded-lg border-2 border-transparent bg-slate-100 text-slate-600 hover:bg-slate-200 font-semibold text-xs transition">
            <i class="fa-solid fa-hand"></i>
            <span>拖曳底圖</span>
          </button>
        </div>
      </div>

      <!-- 側邊欄核心功能滾動區 (高度彈性，內滾動) -->
      <div class="flex-1 overflow-y-auto sidebar-scroll p-3 space-y-4">
        
        <!-- 當前選中元件輔助操作 (有選中時動態顯示) -->
        <div id="element-actions-box" class="hidden p-2.5 bg-indigo-50/90 rounded-xl border border-indigo-100 space-y-2">
          <div class="flex items-center justify-between">
            <span class="text-xs font-bold text-indigo-800">選中元件：<span id="txt-selected-type" class="text-indigo-600 font-normal">未定</span></span>
            <button id="btn-cancel-select" class="text-[10px] text-slate-400 hover:text-slate-600">取消選取</button>
          </div>
          <div class="grid grid-cols-2 gap-1.5">
            <button id="btn-clone-el" class="flex items-center justify-center space-x-1 py-1 bg-white border border-indigo-200 hover:bg-indigo-100 text-indigo-700 text-xs font-semibold rounded-lg transition">
              <i class="fa-solid fa-copy"></i>
              <span>複製元件</span>
            </button>
            <button id="btn-delete-el" class="flex items-center justify-center space-x-1 py-1 bg-red-50 border border-red-200 hover:bg-red-100 text-red-600 text-xs font-semibold rounded-lg transition">
              <i class="fa-solid fa-trash-can"></i>
              <span>刪除元件</span>
            </button>
          </div>
        </div>

        <!-- 1. 燈具與光源庫 -->
        <div class="bg-white p-2.5 rounded-xl border border-slate-200/80 shadow-sm">
          <h3 class="text-xs font-bold text-slate-700 mb-2.5 flex items-center justify-between">
            <span class="flex items-center"><span class="w-1.5 h-3.5 bg-emerald-500 rounded-full mr-1.5"></span>1. 燈具與光源 (點擊加入)</span>
            <span class="text-[9px] text-slate-400">綠色為嵌燈</span>
          </h3>
          <div class="grid grid-cols-2 gap-1.5">
            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-emerald-300 hover:bg-emerald-50/20 transition text-center group" data-type="light-9">
              <svg width="22" height="22" viewBox="0 0 26 26" class="mb-1">
                <circle cx="13" cy="13" r="9" fill="none" stroke="#22c55e" stroke-width="2"/>
                <circle cx="13" cy="13" r="3" fill="#22c55e"/>
              </svg>
              <span class="text-[11px] font-bold text-slate-700">9CM 嵌燈</span>
              <span class="text-[8px] text-slate-400">綠心圓燈</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-emerald-300 hover:bg-emerald-50/20 transition text-center group" data-type="light-7.5">
              <svg width="22" height="22" viewBox="0 0 24 24" class="mb-1">
                <circle cx="12" cy="12" r="8" fill="none" stroke="#22c55e" stroke-width="1.8"/>
                <line x1="12" y1="2" x2="12" y2="22" stroke="#22c55e" stroke-width="1" stroke-dasharray="1.5,1.5"/>
                <line x1="2" y1="12" x2="22" y2="12" stroke="#22c55e" stroke-width="1" stroke-dasharray="1.5,1.5"/>
              </svg>
              <span class="text-[11px] font-bold text-slate-700">7.5CM 嵌燈</span>
              <span class="text-[8px] text-slate-400">綠色十字圓</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-slate-300 hover:bg-slate-50 transition text-center group" data-type="light-12">
              <svg width="22" height="22" viewBox="0 0 30 30" class="mb-1">
                <circle cx="15" cy="15" r="10" fill="none" stroke="#4b5563" stroke-width="2"/>
                <circle cx="15" cy="15" r="4" fill="none" stroke="#4b5563" stroke-width="1"/>
              </svg>
              <span class="text-[11px] font-bold text-slate-700">12CM 嵌燈</span>
              <span class="text-[8px] text-slate-400">灰色雙心圓</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-slate-300 hover:bg-slate-50 transition text-center group" data-type="light-pendant">
              <svg width="22" height="22" viewBox="0 0 30 30" class="mb-1">
                <circle cx="15" cy="15" r="8" fill="none" stroke="#4b5563" stroke-width="1.8"/>
                <line x1="15" y1="3" x2="15" y2="27" stroke="#4b5563" stroke-width="1.8"/>
                <line x1="3" y1="15" x2="27" y2="15" stroke="#4b5563" stroke-width="1.8"/>
              </svg>
              <span class="text-[11px] font-bold text-slate-700">吊燈</span>
              <span class="text-[8px] text-slate-400">放射交叉圓</span>
            </button>
          </div>
        </div>

        <!-- 2. 開關面板庫 -->
        <div class="bg-white p-2.5 rounded-xl border border-slate-200/80 shadow-sm">
          <h3 class="text-xs font-bold text-slate-700 mb-2.5 flex items-center justify-between">
            <span class="flex items-center"><span class="w-1.5 h-3.5 bg-blue-500 rounded-full mr-1.5"></span>2. 開關面板 (點擊加入)</span>
            <span class="text-[9px] text-red-500">紅色為新設</span>
          </h3>
          <div class="grid grid-cols-2 gap-1.5">
            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-blue-300 hover:bg-blue-50/20 transition text-center group" data-type="switch-s">
              <div class="w-7 h-7 rounded-full border border-slate-300 flex items-center justify-center text-slate-600 font-bold text-[11px] mb-1 bg-white">S</div>
              <span class="text-[11px] font-bold text-slate-700">原有單切</span>
              <span class="text-[8px] text-slate-400">灰色 S</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-blue-300 hover:bg-blue-50/20 transition text-center group" data-type="switch-s3">
              <div class="w-7 h-7 rounded-full border border-slate-300 flex items-center justify-center text-slate-600 font-bold text-[11px] mb-1 bg-white relative">
                S<span class="text-[7px] absolute top-0 right-1 font-bold">3</span>
              </div>
              <span class="text-[11px] font-bold text-slate-700">原有雙切</span>
              <span class="text-[8px] text-slate-400">灰色 S3</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-red-300 hover:bg-red-50/20 transition text-center group" data-type="switch-new-s">
              <div class="w-7 h-7 rounded-full border border-red-200 flex items-center justify-center text-red-500 font-bold text-[11px] mb-1 bg-red-50/50">S</div>
              <span class="text-[11px] font-bold text-slate-700">新增單切</span>
              <span class="text-[8px] text-red-400">紅色 S</span>
            </button>

            <button class="add-item-btn flex flex-col items-center justify-center p-2 border border-slate-100 rounded-lg hover:border-red-300 hover:bg-red-50/20 transition text-center group" data-type="switch-new-s3">
              <div class="w-7 h-7 rounded-full border border-red-200 flex items-center justify-center text-red-500 font-bold text-[11px] mb-1 bg-red-50/50 relative">
                S<span class="text-[7px] absolute top-0 right-1 font-bold">3</span>
              </div>
              <span class="text-[11px] font-bold text-slate-700">新增雙切</span>
              <span class="text-[8px] text-red-400">紅色 S3</span>
            </button>
          </div>
        </div>

        <!-- 3. 配線與燈條 -->
        <div class="bg-white p-2.5 rounded-xl border border-slate-200/80 shadow-sm">
          <h3 class="text-xs font-bold text-slate-700 mb-2 flex items-center">
            <span class="w-1.5 h-3.5 bg-orange-500 rounded-full mr-1.5"></span>
            3. 畫配電線路與燈條
          </h3>
          <div class="space-y-1.5">
            <!-- 單切線路 -->
            <button id="btn-draw-single" class="draw-tool-btn w-full flex items-center justify-between p-2 border border-slate-100 rounded-lg hover:border-slate-300 hover:bg-slate-50 transition text-left">
              <div class="flex items-center space-x-2">
                <svg width="24" height="16" class="flex-shrink-0">
                  <path d="M 0,8 Q 6,2 12,8 T 24,8" fill="none" stroke="#1f2937" stroke-width="1.8"/>
                </svg>
                <div>
                  <div class="text-[11px] font-bold text-slate-700">單切線路 (黑色波浪線)</div>
                  <div class="text-[8px] text-slate-400">選定起點元件後進行拉線</div>
                </div>
              </div>
            </button>

            <!-- 雙切線路 -->
            <button id="btn-draw-double" class="draw-tool-btn w-full flex items-center justify-between p-2 border border-slate-100 rounded-lg hover:border-red-200 hover:bg-red-50/10 transition text-left">
              <div class="flex items-center space-x-2">
                <svg width="24" height="16" class="flex-shrink-0">
                  <path d="M 0,8 Q 6,2 12,8 T 24,8" fill="none" stroke="#ef4444" stroke-width="1.8"/>
                </svg>
                <div>
                  <div class="text-[11px] font-bold text-slate-700">雙切線路 (紅色波浪線)</div>
                  <div class="text-[8px] text-slate-400">雙切迴路專用正弦波</div>
                </div>
              </div>
            </button>

            <!-- 鋁條燈 -->
            <button id="btn-draw-strip-orange" class="draw-tool-btn w-full flex items-center justify-between p-2 border border-slate-100 rounded-lg hover:border-orange-200 hover:bg-orange-50/10 transition text-left">
              <div class="flex items-center space-x-2">
                <div class="w-6 h-2 bg-orange-500 rounded flex-shrink-0"></div>
                <div>
                  <div class="text-[11px] font-bold text-slate-700">鋁條燈 (橘色粗實線)</div>
                  <div class="text-[8px] text-slate-400">點擊兩點繪製嵌入條燈</div>
                </div>
              </div>
            </button>

            <!-- 罩板燈 -->
            <button id="btn-draw-strip-yellow" class="draw-tool-btn w-full flex items-center justify-between p-2 border border-slate-100 rounded-lg hover:border-amber-200 hover:bg-amber-50/10 transition text-left">
              <div class="flex items-center space-x-2">
                <div class="w-6 h-2 bg-amber-300 rounded border border-amber-400 flex-shrink-0"></div>
                <div>
                  <div class="text-[11px] font-bold text-slate-700">罩板燈 (黃色粗實線)</div>
                  <div class="text-[8px] text-slate-400">間接照明發光燈槽</div>
                </div>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- 底部控制調整區 (固定底部，不佔大空間) -->
      <div class="border-t border-slate-200 p-3 bg-white space-y-2.5 flex-shrink-0">
        <div>
          <div class="flex justify-between text-[11px] text-slate-500 mb-1">
            <span class="font-bold">戶型底圖透明度</span>
            <span id="val-opacity" class="font-mono">90%</span>
          </div>
          <input type="range" id="bg-opacity" min="10" max="100" value="90" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600">
        </div>
        <div class="flex items-center justify-between text-xs pt-1 border-t border-slate-100">
          <button id="btn-toggle-grid" class="text-indigo-600 hover:text-indigo-800 font-bold flex items-center">
            <i class="fa-solid fa-border-all mr-1.5"></i>網格吸附 (開啟)
          </button>
          
          <!-- 手動上傳按鈕備用 -->
          <label class="text-[11px] text-slate-500 hover:text-slate-800 cursor-pointer flex items-center">
            <i class="fa-solid fa-upload mr-1 text-slate-400"></i>替換底圖
            <input type="file" id="bg-upload" accept="image/*" class="hidden">
          </label>
        </div>
      </div>
    </aside>

    <!-- 中央主要畫布區 (高度與寬度自適應) -->
    <main class="flex-1 bg-slate-200/50 flex items-center justify-center overflow-hidden relative">
      <!-- 快捷操作提示框 -->
      <div class="absolute top-3 left-3 bg-slate-900/90 text-white text-[11px] px-3.5 py-2 rounded-xl shadow-md z-30 flex items-center space-x-2.5 border border-slate-800 backdrop-blur-sm pointer-events-none transition-all duration-300" id="tip-bar">
        <span class="inline-block w-2 h-2 rounded-full bg-amber-400 animate-ping"></span>
        <span id="tip-text">提示：點擊元件可選中並移動位置；雙擊空白處可取消選取。</span>
      </div>

      <!-- 線路控制浮動選單 (僅在繪圖模式中顯示) -->
      <div id="draw-actions" class="absolute top-3 right-3 bg-white px-3 py-2 rounded-xl shadow-lg z-30 hidden items-center space-x-1.5 border border-slate-200">
        <span class="text-xs font-bold text-slate-600 mr-2" id="draw-mode-label">正在配線</span>
        <button id="btn-draw-cancel" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-2.5 py-1 rounded-lg text-[11px] font-bold transition">
          取消
        </button>
        <button id="btn-draw-done" class="bg-indigo-600 hover:bg-indigo-500 text-white px-2.5 py-1 rounded-lg text-[11px] font-bold transition">
          完成線路
        </button>
      </div>

      <!-- 視窗容器 -->
      <div class="w-full h-full overflow-hidden flex items-center justify-center" id="viewport">
        <!-- 畫布核心容器 (直式比例符合 1212d.jpg 格式：寬 800, 高 960) -->
        <div id="canvas-container" class="canvas-container relative bg-white shadow-2xl origin-center select-none" style="width: 800px; height: 960px;">
          <!-- 1. 背景底圖層 (直接使用 1212d.jpg) -->
          <img id="layout-bg-img" src="1212d.jpg" class="absolute inset-0 w-full h-full object-contain pointer-events-none transition-opacity" style="opacity: 0.9;" onerror="handleBgImageError()">
          
          <!-- 2. 配線與連線向量圖層 -->
          <canvas id="wiring-canvas" class="absolute inset-0 pointer-events-none" width="800" height="960"></canvas>

          <!-- 3. HTML 元件互動控制層 -->
          <div id="elements-layer" class="absolute inset-0"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- 彈出式訊息提示 -->
  <div id="toast" class="fixed bottom-4 right-4 transform translate-y-10 opacity-0 bg-slate-950 text-white px-4 py-2.5 rounded-xl shadow-2xl z-50 flex items-center space-x-2.5 transition-all duration-300 border border-slate-800">
    <i class="fa-solid fa-circle-check text-emerald-400 text-base"></i>
    <span class="text-xs font-semibold" id="toast-text">設定成功</span>
  </div>

  <!-- ==================== 核心 JavaScript ==================== -->
  <script>
    // 預載 1212d.jpg 的高精度格局與位置座標
    let state = {
      appId: 'chiu-lighting-designer-1212d',
      zoom: 1.0, 
      panX: 0,
      panY: 0,
      isPanning: false,
      startPanX: 0,
      startPanY: 0,
      activeTool: 'select', 
      activeDrawTool: null, 
      snapToGrid: true,
      gridSize: 10,
      bgImageSrc: '1212d.jpg',
      bgOpacity: 0.9,
      isLocked: false, // 是否鎖定畫布

      // 設計元件數據
      elements: [], 
      connections: [], 
      
      selectedElementId: null,
      tempWiringPoints: [], 
      hoveredSnapPoint: null, 
    };

    // DOM 節點
    const viewport = document.getElementById('viewport');
    const container = document.getElementById('canvas-container');
    const elementsLayer = document.getElementById('elements-layer');
    const wiringCanvas = document.getElementById('wiring-canvas');
    const wiringCtx = wiringCanvas.getContext('2d');
    const layoutBgImg = document.getElementById('layout-bg-img');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toast-text');
    const tipText = document.getElementById('tip-text');
    const tipBar = document.getElementById('tip-bar');
    
    // UI 控制
    const toolSelect = document.getElementById('tool-select');

    // 自動計算最完美的 Zoom 與 Pan（100% Fit，不產生任何全網頁捲軸）
    function autoFitLayoutToViewport() {
      const viewRect = viewport.getBoundingClientRect();
      const padding = 30; // 邊緣留白
      const availWidth = viewRect.width - padding;
      const availHeight = viewRect.height - padding;

      // 畫布物理設計大小是 800 x 960
      const zoomX = availWidth / 800;
      const zoomY = availHeight / 960;
      
      // 取其小者，保證能完整塞在視窗內
      let bestZoom = Math.min(zoomX, zoomY);
      
      // 限制最大縮放不要過大
      bestZoom = Math.min(bestZoom, 1.1);
      
      state.zoom = bestZoom;
      state.panX = 0;
      state.panY = 0; // 完美置中
      
      updateViewport();
    }

    function renderWiring() {
      wiringCtx.clearRect(0, 0, wiringCanvas.width, wiringCanvas.height);
      
      state.connections.forEach(conn => {
        let pts = [];
        if (conn.fromElementId && conn.toElementId) {
          const fromEl = state.elements.find(e => e.id === conn.fromElementId);
          const toEl = state.elements.find(e => e.id === conn.toElementId);
          if (fromEl && toEl) {
            pts = [{ x: fromEl.x, y: fromEl.y }];
            if (conn.points && conn.points.length > 2) {
              pts = pts.concat(conn.points.slice(1, -1));
            }
            pts.push({ x: toEl.x, y: toEl.y });
          } else {
            pts = conn.points;
          }
        } else {
          pts = conn.points;
        }

        if (!pts || pts.length < 2) return;

        if (conn.type === 'single-wiring' || conn.type === 'double-wiring') {
          const isDouble = conn.type === 'double-wiring';
          wiringCtx.strokeStyle = isDouble ? '#ef4444' : '#1f2937';
          wiringCtx.lineWidth = 2.5;
          wiringCtx.lineCap = 'round';
          wiringCtx.lineJoin = 'round';
          drawWavyPath(wiringCtx, pts);
        } else if (conn.type === 'strip-orange') {
          wiringCtx.strokeStyle = '#f97316';
          wiringCtx.lineWidth = 6;
          wiringCtx.lineCap = 'square';
          wiringCtx.beginPath();
          wiringCtx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) wiringCtx.lineTo(pts[i].x, pts[i].y);
          wiringCtx.stroke();
        } else if (conn.type === 'strip-yellow') {
          wiringCtx.strokeStyle = '#facc15';
          wiringCtx.lineWidth = 6;
          wiringCtx.lineCap = 'square';
          wiringCtx.beginPath();
          wiringCtx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) wiringCtx.lineTo(pts[i].x, pts[i].y);
          wiringCtx.stroke();
        }
      });

      // 拉線動態
      if (state.activeDrawTool && state.tempWiringPoints.length > 0) {
        const isDouble = state.activeDrawTool === 'double-wiring';
        const isOrange = state.activeDrawTool === 'strip-orange';
        const isYellow = state.activeDrawTool === 'strip-yellow';

        wiringCtx.lineWidth = (isOrange || isYellow) ? 6 : 2.5;
        wiringCtx.strokeStyle = isOrange ? '#f97316' : (isYellow ? '#facc15' : (isDouble ? '#ef4444' : '#1f2937'));
        wiringCtx.lineCap = 'round';

        if (isOrange || isYellow) {
          wiringCtx.beginPath();
          wiringCtx.moveTo(state.tempWiringPoints[0].x, state.tempWiringPoints[0].y);
          for (let i = 1; i < state.tempWiringPoints.length; i++) {
            wiringCtx.lineTo(state.tempWiringPoints[i].x, state.tempWiringPoints[i].y);
          }
          wiringCtx.stroke();
        } else {
          drawWavyPath(wiringCtx, state.tempWiringPoints);
        }
      }

      // 智慧吸附提示
      if (state.hoveredSnapPoint) {
        wiringCtx.fillStyle = '#22c55e';
        wiringCtx.beginPath();
        wiringCtx.arc(state.hoveredSnapPoint.x, state.hoveredSnapPoint.y, 6, 0, Math.PI * 2);
        wiringCtx.fill();
        wiringCtx.strokeStyle = 'white';
        wiringCtx.lineWidth = 1.5;
        wiringCtx.stroke();
      }
    }

    // 正弦波算法
    function drawWavyPath(ctx, points) {
      if (points.length < 2) return;
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);

      for (let i = 0; i < points.length - 1; i++) {
        let p1 = points[i];
        let p2 = points[i+1];
        let dx = p2.x - p1.x;
        let dy = p2.y - p1.y;
        let dist = Math.hypot(dx, dy);
        
        if (dist === 0) continue;
        const wavelength = 15; 
        const amplitude = 4.5;   
        let angle = Math.atan2(dy, dx);
        
        for (let t = 0; t <= dist; t += 2) {
          let ratio = t / dist;
          let bx = p1.x + dx * ratio;
          let by = p1.y + dy * ratio;
          let wave = Math.sin((t / wavelength) * Math.PI * 2) * amplitude;
          let x = bx - Math.sin(angle) * wave;
          let y = by + Math.cos(angle) * wave;
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();
    }

    // 更新 Canvas Transforms
    function updateViewport() {
      container.style.transform = `translate(${state.panX}px, ${state.panY}px) scale(${state.zoom})`;

    // ==================== 事件與選單操作綁定 ====================

    function setupEventListeners() {
      // 點擊新增元件
      document.querySelectorAll('.add-item-btn').forEach(btn => {

      container.addEventListener('dblclick', (e) => {
        if (e.target === container || e.target === layoutBgImg) {
          state.selectedElementId = null;
          renderElements();
        }
      });

      // 鎖定畫布功能切換 (防止畫布亂跑、誤觸平移)
      btnLockCanvas.addEventListener('click', () => {
        state.isLocked = !state.isLocked;
        if (state.isLocked) {
          btnLockCanvas.innerHTML = '<i class="fa-solid fa-lock text-[8px]"></i> <span>已鎖定畫布</span>';
          btnLockCanvas.className = "text-[10px] flex items-center space-x-1 px-2 py-0.5 rounded-full border border-indigo-200 bg-indigo-50 text-indigo-600 font-bold";
          setMouseMode('select'); // 強制切換為選擇模式
          showToast('畫布已鎖定，無法平移或縮放底圖。', 'info');
        } else {
          btnLockCanvas.innerHTML = '<i class="fa-solid fa-unlock text-[8px]"></i> <span>未鎖定畫布</span>';
          btnLockCanvas.className = "text-[10px] flex items-center space-x-1 px-2 py-0.5 rounded-full border border-slate-200 text-slate-500 hover:bg-slate-100 transition";
          showToast('畫布已解鎖。', 'info');
        }
      });

      // 滾輪縮放 (加上鎖定防護)
      viewport.addEventListener('wheel', (e) => {
        if (state.isLocked) return;
        e.preventDefault();
        const zoomIntensity = 0.05;
        const rect = viewport.getBoundingClientRect();
        const mouseX = e.clientX - rect.left - rect.width / 2;
        const mouseY = e.clientY - rect.top - rect.height / 2;
        
        const oldZoom = state.zoom;
        if (e.deltaY < 0) {
          state.zoom = Math.min(state.zoom + zoomIntensity, 2.0); // 上限 2.0 倍
        } else {
          state.zoom = Math.max(state.zoom - zoomIntensity, 0.4); // 下限 0.4 倍
        }
        
        state.panX -= mouseX * (state.zoom / oldZoom - 1);
        state.panY -= mouseY * (state.zoom / oldZoom - 1);
        
        // 邊界防護：防止底圖飄得太遠
        restrictPanBoundaries();
        updateViewport();
      }, { passive: false });

      // 滑鼠平移底圖 (加上鎖定與防拖走機制)
      viewport.addEventListener('mousedown', (e) => {
        if (state.isLocked) return;
        if (e.button === 1 || state.activeTool === 'pan') {
          state.isPanning = true;
          state.startPanX = e.clientX - state.panX;
          state.startPanY = e.clientY - state.panY;
          viewport.style.cursor = 'grabbing';
          e.preventDefault();
        }
      });

      window.addEventListener('mousemove', (e) => {
        if (state.isPanning) {
          state.panX = e.clientX - state.startPanX;
          state.panY = e.clientY - state.startPanY;
          
          restrictPanBoundaries();
          updateViewport();
        }
      });

      window.addEventListener('mouseup', () => {
        if (state.isPanning) {
          state.isPanning = false;
          viewport.style.cursor = state.activeTool === 'pan' ? 'grab' : 'default';
        }
      });

      // 限制拖曳範圍，不讓畫布離開可視範圍之外
      function restrictPanBoundaries() {
        const viewRect = viewport.getBoundingClientRect();
        const limitX = viewRect.width * 0.6;
        const limitY = viewRect.height * 0.6;
        state.panX = Math.max(-limitX, Math.min(limitX, state.panX));
        state.panY = Math.max(-limitY, Math.min(limitY, state.panY));
      }

      // 畫配電線路交互
      container.addEventListener('click', (e) => {
        if (!state.activeDrawTool) return;
        
        const rect = container.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) / state.zoom;
        const clickY = (e.clientY - rect.top) / state.zoom;
        
        let targetX = clickX;
        let targetY = clickY;

        const snap = getSnapPoint(clickX, clickY);
        if (snap) {
          targetX = snap.x;
          targetY = snap.y;
        } else if (state.snapToGrid) {
          targetX = Math.round(clickX / state.gridSize) * state.gridSize;
          targetY = Math.round(clickY / state.gridSize) * state.gridSize;
        }

        if (state.activeDrawTool === 'single-wiring' || state.activeDrawTool === 'double-wiring') {
          if (state.tempWiringPoints.length === 0) {
            if (snap && snap.elementId) {
              state.tempWiringPoints.push({ x: targetX, y: targetY, elementId: snap.elementId });
              updateTipText("已設定起點，請點選轉折點，最後點選終點元件完成線路。");
            } else {
              showToast("配線起點必須落在開關或燈具元件上！", "warning");
              return;
            }
          } else {
            if (snap && snap.elementId) {
              state.tempWiringPoints.push({ x: targetX, y: targetY, elementId: snap.elementId });
              saveWiringConnection();
            } else {
              state.tempWiringPoints.push({ x: targetX, y: targetY });
            }
          }
        } else if (state.activeDrawTool === 'strip-orange' || state.activeDrawTool === 'strip-yellow') {
          if (state.tempWiringPoints.length === 0) {
            state.tempWiringPoints.push({ x: targetX, y: targetY });
            updateTipText("起點已就緒，請在畫布上點選條燈終點。");
          } else {
            state.tempWiringPoints.push({ x: targetX, y: targetY });
            saveStripConnection();
          }
        }
        renderWiring();
      });

      container.addEventListener('mousemove', (e) => {
        const rect = container.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) / state.zoom;
        const clickY = (e.clientY - rect.top) / state.zoom;

        const snap = getSnapPoint(clickX, clickY);
        state.hoveredSnapPoint = snap ? snap : null;

        if (state.activeDrawTool && state.tempWiringPoints.length > 0) {
          let currentTargetX = clickX;
          let currentTargetY = clickY;

          if (snap) {
            currentTargetX = snap.x;
            currentTargetY = snap.y;
          } else if (state.snapToGrid) {
            currentTargetX = Math.round(clickX / state.gridSize) * state.gridSize;
            currentTargetY = Math.round(clickY / state.gridSize) * state.gridSize;
          }

          if (state.tempWiringPoints.length > 1 && !state.tempWiringPoints[state.tempWiringPoints.length - 1].elementId) {
            state.tempWiringPoints[state.tempWiringPoints.length - 1] = { x: currentTargetX, y: currentTargetY };
          } else {
            state.tempWiringPoints.push({ x: currentTargetX, y: currentTargetY });
          }
        }
        renderWiring();
      });

      // 繪線工具模式切換
      btnDrawSingle.addEventListener('click', () => startDrawMode('single-wiring'));
      btnDrawDouble.addEventListener('click', () => startDrawMode('double-wiring'));
      btnDrawStripOrange.addEventListener('click', () => startDrawMode('strip-orange'));
      btnDrawStripYellow.addEventListener('click', () => startDrawMode('strip-yellow'));
      
      btnDrawCancel.addEventListener('click', cancelDrawMode);
      btnDrawDone.addEventListener('click', () => {
        if (state.activeDrawTool === 'single-wiring' || state.activeDrawTool === 'double-wiring') {
          saveWiringConnection();
        } else {
          cancelDrawMode();
        }
      });

      // 透明度 slider 聯動
      bgOpacitySlider.addEventListener('input', (e) => {
        state.bgOpacity = e.target.value / 100;
        valOpacity.innerText = `${e.target.value}%`;
        layoutBgImg.style.opacity = state.bgOpacity;
      });

      // 網格吸附
      btnToggleGrid.addEventListener('click', () => {
        state.snapToGrid = !state.snapToGrid;
        btnToggleGrid.innerHTML = state.snapToGrid ? '<i class="fa-solid fa-border-all mr-1.5"></i>網格吸附 (開啟)' : '<i class="fa-solid fa-border-all mr-1.5"></i>網格吸附 (關閉)';
        btnToggleGrid.className = state.snapToGrid ? 'text-indigo-600 hover:text-indigo-800 font-bold flex items-center' : 'text-slate-400 hover:text-slate-600 font-bold flex items-center';
        showToast(state.snapToGrid ? "網格對齊已啟用" : "網格對齊已關閉", "info");
      });

      // 點擊置中對焦
      btnRecenter.addEventListener('click', () => {
        autoFitLayoutToViewport();
        showToast("已重置底圖位置，完美置中對焦！", "success");
      });

      // 複製、刪除元件 (適合行動端與滑鼠快速點選)
      btnCloneEl.addEventListener('click', cloneSelectedElement);
      btnDeleteEl.addEventListener('click', deleteSelectedElement);
      btnCancelSelect.addEventListener('click', () => {
        state.selectedElementId = null;
        renderElements();
      });

      // 清空重置
      btnReset.addEventListener('click', () => {
        if (confirm("確定要清除所有自訂燈具與重新佈線嗎？")) {
          loadInitialElements();
          state.selectedElementId = null;
          renderAll();
          showToast("配置已回復至 1212d 初始樣貌", "info");
        }
      });

      // 上傳底圖
      bgUpload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(evt) {
            state.bgImageSrc = evt.target.result;
            layoutBgImg.src = state.bgImageSrc;
            showToast("底圖替換成功！", "success");
            autoFitLayoutToViewport();
          };
          reader.readAsDataURL(file);
        }
      });

      // 鍵盤 Delete / Backspace 快速刪除元件
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Delete' || e.key === 'Backspace') {
          deleteSelectedElement();
        }
      });

      // 儲存為高畫質 JPEG
      btnExport.addEventListener('click', exportLayoutAsJPG);
    }

    // ==================== 畫布元件操作 ====================

    function addNewElement(type) {
      // 在畫布中心偏上位置生成 (避免擋住主臥)
      const x = 400;
      const y = 480;
      const id = `el-${Date.now()}`;
      state.elements.push({ id, type, x, y });
      state.selectedElementId = id;
      renderAll();
      showToast("元件加入成功，您可以直接拖曳其位置！", "success");
    }

    function cloneSelectedElement() {
      if (!state.selectedElementId) return;
      const origin = state.elements.find(el => el.id === state.selectedElementId);
      if (origin) {
        const id = `el-${Date.now()}`;
        state.elements.push({
          id,
          type: origin.type,
          x: Math.min(800 - 30, origin.x + 20), 
          y: Math.min(960 - 30, origin.y + 20)
        });
        state.selectedElementId = id;
        renderAll();
        showToast("元件複製成功！", "success");
      }
    }

    function deleteSelectedElement() {
      if (state.selectedElementId) {
        state.elements = state.elements.filter(el => el.id !== state.selectedElementId);
        // 同步刪除連線
        state.connections = state.connections.filter(c => c.fromElementId !== state.selectedElementId && c.toElementId !== state.selectedElementId);
        state.selectedElementId = null;
        renderAll();
        showToast("元件及其對應配線已成功刪除！", "info");
      }
    }

    // 元件拖曳事件處理
    function handleElementMouseDown(e, element) {
      if (state.activeTool === 'pan' || state.activeDrawTool) return;
      e.stopPropagation();

      state.selectedElementId = element.id;
      renderElements();

      const startX = e.clientX;
      const startY = e.clientY;
      const origX = element.x;
      const origY = element.y;

      function onMouseMove(moveEvt) {
        const dx = (moveEvt.clientX - startX) / state.zoom;
        const dy = (moveEvt.clientY - startY) / state.zoom;
        let newX = origX + dx;
        let newY = origY + dy;

        // 畫布邊界碰撞保護
        newX = Math.max(15, Math.min(800 - 15, newX));
        newY = Math.max(15, Math.min(960 - 15, newY));

        // 網格吸附計算
        if (state.snapToGrid) {
          newX = Math.round(newX / state.gridSize) * state.gridSize;
          newY = Math.round(newY / state.gridSize) * state.gridSize;
        }

        element.x = newX;
        element.y = newY;

        const dom = document.getElementById(element.id);
        if (dom) {
          dom.style.left = `${newX}px`;
          dom.style.top = `${newY}px`;
        }
        renderWiring();
      }

      function onMouseUp() {
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('mouseup', onMouseUp);
      }

      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('mouseup', onMouseUp);
    }

    // 元件吸附感應
    function getSnapPoint(x, y) {
      const snapRadius = 20; 
      for (let i = 0; i < state.elements.length; i++) {
        const el = state.elements[i];
        const dist = Math.hypot(el.x - x, el.y - y);
        if (dist < snapRadius) {
          return { x: el.x, y: el.y, elementId: el.id };
        }
      }
      return null;
    }

    // ==================== 繪線模式狀態轉換 ====================

    function setMouseMode(mode) {
      state.activeTool = mode;
      toolSelect.className = mode === 'select' 
        ? "flex items-center justify-center space-x-1.5 py-2 px-2 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-semibold text-xs transition"
        : "flex items-center justify-center space-x-1.5 py-2 px-2 rounded-lg border-2 border-transparent bg-slate-100 text-slate-600 hover:bg-slate-200 font-semibold text-xs transition";

      toolPan.className = mode === 'pan'
        ? "flex items-center justify-center space-x-1.5 py-2 px-2 rounded-lg border-2 border-indigo-600 bg-indigo-50 text-indigo-700 font-semibold text-xs transition"
        : "flex items-center justify-center space-x-1.5 py-2 px-2 rounded-lg border-2 border-transparent bg-slate-100 text-slate-600 hover:bg-slate-200 font-semibold text-xs transition";

      if (mode === 'pan') {
        container.className = "canvas-container pan-mode relative bg-white shadow-2xl origin-center select-none";
        cancelDrawMode();
      } else {
        container.className = "canvas-container relative bg-white shadow-2xl origin-center select-none";
      }
    }

    function startDrawMode(tool) {
      if (state.isLocked) {
        showToast("畫布已鎖定。請先點選左上角【解鎖】再繪製線路！", "warning");
        return;
      }
      setMouseMode('select');
      state.activeDrawTool = tool;
      state.tempWiringPoints = [];
      container.classList.add('draw-mode');
      drawActions.style.display = 'flex';
      
      let title = "";
      if (tool === 'single-wiring') {
        title = "正在繪製：單切線路 (黑色波浪)";
        updateTipText("請先點擊起點元件，接著點擊各轉折點，最後點擊終點元件完成。");
      } else if (tool === 'double-wiring') {
        title = "正在繪製：雙切線路 (紅色波浪)";
        updateTipText("請點選雙控起點與終點元件完成雙切配線。");
      } else if (tool === 'strip-orange') {
        title = "正在繪製：鋁條燈 (橘色粗線)";
        updateTipText("在畫布上依序點選起點與終點，即可產生嵌入型鋁條燈。");
      } else if (tool === 'strip-yellow') {
        title = "正在繪製：罩板燈 (黃色粗線)";
        updateTipText("點選兩點即可拉出間接反光罩板燈條。");
      }
      drawModeLabel.innerText = title;
    }

    function cancelDrawMode() {
      state.activeDrawTool = null;
      state.tempWiringPoints = [];
      container.classList.remove('draw-mode');
      drawActions.style.display = 'none';
      updateTipText("提示：點擊元件可選中並移動位置；雙擊空白處可取消選取。");
      renderWiring();
    }

    function saveWiringConnection() {
      const validPoints = state.tempWiringPoints.filter(p => !p.isTemp);
      if (validPoints.length < 2) {
        showToast("配線節點不足，已取消連線。", "warning");
        cancelDrawMode();
        return;
      }
      const firstPt = validPoints[0];
      const lastPt = validPoints[validPoints.length - 1];

      if (!firstPt.elementId || !lastPt.elementId) {
        showToast("配電線路的頭尾必須完美連在開關或燈具元件上！", "warning");
        cancelDrawMode();
        return;
      }

      state.connections.push({
        id: `con-${Date.now()}`,
        type: state.activeDrawTool,
        fromElementId: firstPt.elementId,
        toElementId: lastPt.elementId,
        points: validPoints.map(p => ({ x: p.x, y: p.y }))
      });
      showToast("新配電連線路徑已成功儲存！", "success");
      cancelDrawMode();
    }

    function saveStripConnection() {
      const validPoints = state.tempWiringPoints.filter(p => !p.isTemp);
      if (validPoints.length < 2) {
        cancelDrawMode();
        return;
      }
      state.connections.push({
        id: `con-${Date.now()}`,
        type: state.activeDrawTool,
        points: [validPoints[0], validPoints[1]]
      });
      showToast("裝飾條燈配置已完成！", "success");
      cancelDrawMode();
    }

    function updateTipText(text) {
      tipText.innerText = text;
      tipBar.classList.remove('opacity-0');
    }

    function showToast(text, type = 'success') {
      toastText.innerText = text;
      const icon = toast.querySelector('i');
      if (type === 'success') {
        icon.className = "fa-solid fa-circle-check text-emerald-400 text-base";
      } else if (type === 'warning') {
        icon.className = "fa-solid fa-triangle-exclamation text-amber-400 text-base";
      } else if (type === 'info') {
        icon.className = "fa-solid fa-circle-info text-blue-400 text-base";
      }

      toast.classList.remove('opacity-0', 'translate-y-10');
      toast.classList.add('opacity-100', 'translate-y-0');

      setTimeout(() => {
        toast.classList.remove('opacity-100', 'translate-y-0');
        toast.classList.add('opacity-0', 'translate-y-10');
      }, 3500);
    }

    // ==================== 高畫質 JPEG 匯出 ====================

    function exportLayoutAsJPG() {
      showToast("正在準備輸出配置圖...", "info");

      // 建立完全同等 800 x 960 比例的離屏 Canvas 進行純白底合成
      const exportCanvas = document.createElement('canvas');
      exportCanvas.width = 800;
      exportCanvas.height = 960;
      const ctx = exportCanvas.getContext('2d');

      // 1. 設定純白底色 (符合網頁白色底色與列印需求)
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, 800, 960);

      const renderExportLayers = () => {
        ctx.globalAlpha = 1.0;

        // 3. 繪製線路與燈條
        state.connections.forEach(conn => {
          let pts = [];
          if (conn.fromElementId && conn.toElementId) {
            const fromEl = state.elements.find(e => e.id === conn.fromElementId);
            const toEl = state.elements.find(e => e.id === conn.toElementId);
            if (fromEl && toEl) {
              pts = [{ x: fromEl.x, y: fromEl.y }];
              if (conn.points && conn.points.length > 2) {
                pts = pts.concat(conn.points.slice(1, -1));
              }
              pts.push({ x: toEl.x, y: toEl.y });
            } else {
              pts = conn.points;
            }
          } else {
            pts = conn.points;
          }

          if (!pts || pts.length < 2) return;

          if (conn.type === 'single-wiring' || conn.type === 'double-wiring') {
            const isDouble = conn.type === 'double-wiring';
            ctx.strokeStyle = isDouble ? '#ef4444' : '#1f2937';
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            drawWavyPath(ctx, pts);
          } else if (conn.type === 'strip-orange') {
            ctx.strokeStyle = '#f97316';
            ctx.lineWidth = 6;
            ctx.lineCap = 'square';
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();
          } else if (conn.type === 'strip-yellow') {
            ctx.strokeStyle = '#facc15';
            ctx.lineWidth = 6;
            ctx.lineCap = 'square';
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();
          }
        });

        // 4. 繪製開關和燈具元件
        state.elements.forEach(el => {
          ctx.save();
          ctx.translate(el.x, el.y);

          if (el.type === 'light-7.5') {
            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 1;
            ctx.setLineDash([2, 2]);
            ctx.beginPath();
            ctx.moveTo(0, -10); ctx.lineTo(0, 10);
            ctx.moveTo(-10, 0); ctx.lineTo(10, 0);
            ctx.stroke();
          } else if (el.type === 'light-9') {
            ctx.beginPath();
            ctx.arc(0, 0, 9, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 3.5, 0, Math.PI * 2);
            ctx.fillStyle = '#22c55e';
            ctx.fill();
          } else if (el.type === 'light-12') {
            ctx.beginPath();
            ctx.arc(0, 0, 11, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 2.5;
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, Math.PI * 2);
            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          } else if (el.type === 'light-pendant') {
            ctx.beginPath();
            ctx.arc(0, 0, 9, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.strokeStyle = '#4b5563';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, -12); ctx.lineTo(0, 12);
            ctx.moveTo(-12, 0); ctx.lineTo(12, 0);
            ctx.stroke();
          } else if (el.type === 'switch-s' || el.type === 'switch-s3') {
            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#9ca3af';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = '#4b5563';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (el.type === 'switch-s') {
              ctx.fillText('S', 0, 0);
            } else {
              ctx.fillText('S', -2, 1);
              ctx.font = 'bold 8px Arial';
              ctx.fillText('3', 6, -3);
            }
          } else if (el.type === 'switch-new-s' || el.type === 'switch-new-s3') {
            ctx.beginPath();
            ctx.arc(0, 0, 14, 0, Math.PI * 2);
            ctx.fillStyle = '#fef2f2';
            ctx.fill();
            ctx.strokeStyle = '#f87171';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 13px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            if (el.type === 'switch-new-s') {
              ctx.fillText('S', 0, 0);
            } else {
              ctx.fillText('S', -2, 1);
              ctx.font = 'bold 9px Arial';
              ctx.fillText('3', 6, -3);
            }
          }
          ctx.restore();
        });

        // 5. 導出並下載圖片
        const imgURL = exportCanvas.toDataURL('image/jpeg', 0.95);
        const link = document.createElement('a');
        link.download = `邱宅_1212d_燈光配置設計圖_${Date.now()}.jpg`;
        link.href = imgURL;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast("高解析 JPG 配置圖已順利下載！", "success");
      };

      // 2. 加載背景底圖
      const bgImg = new Image();
      bgImg.crossOrigin = 'anonymous'; // 避免跨域阻擋
      bgImg.onload = function() {
        ctx.globalAlpha = state.bgOpacity;
        ctx.drawImage(bgImg, 0, 0, 800, 960);
        renderExportLayers();
      };
      bgImg.onerror = function() {
        // 如果載入底圖出錯，僅輸出白底與向量配置
        renderExportLayers();
      };
      bgImg.src = state.bgImageSrc;
    }
  </script>
